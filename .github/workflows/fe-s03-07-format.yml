name: FE-S03-07 format

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feat/ui-fe-s03-07-access-navigation-e2e'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: >-
          pnpm exec prettier --write
          packages/frontend-test-harness/src/customer-access-navigation-scenario.ts
          packages/frontend-test-harness/src/server.ts
          packages/frontend-test-harness/src/index.ts
          packages/frontend-test-harness/tests/customer-access-navigation.test.ts
          e2e/customer-access-navigation.spec.ts
          playwright.config.ts
          docs/design/customer-access-navigation-e2e.md
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/frontend-test-harness e2e/customer-access-navigation.spec.ts playwright.config.ts docs/design/customer-access-navigation-e2e.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "style(customer): format FE-S03-07"
          git push
