name: Fix FE-S05-06 formatting

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'agent/fix-fe-s05-06-formatting'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          persist-credentials: true
          ref: ${{ github.head_ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format affected files
        run: |
          pnpm exec prettier --write \
            e2e/customer-cod-checkout.spec.ts \
            packages/frontend-test-harness/src/customer-cod-checkout-scenario.ts

      - name: Commit formatting and remove temporary workflow
        run: |
          git rm .github/workflows/fix-fe-s05-06-formatting.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "style(frontend): format FE-S05-06 files"
          git push origin HEAD:${{ github.head_ref }}
