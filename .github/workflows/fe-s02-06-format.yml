name: FE-S02-06 format ticket

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'feat/ui-fe-s02-06-frontend-test-harness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Format FE-S02-06 files
        run: |
          pnpm exec prettier --write \
            package.json \
            eslint.config.mjs \
            .github/workflows/ci.yml \
            playwright.config.ts \
            'packages/frontend-test-harness/**/*.{ts,json}' \
            'e2e/**/*.{ts,json}' \
            docs/design/frontend-test-harness.md \
            pnpm-lock.yaml
      - name: Commit formatting
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo 'Ticket files already formatted.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'FE-S02-06 style(testing): format harness fixes'
          git push origin HEAD:${{ github.head_ref }}
