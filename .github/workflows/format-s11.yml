name: Format Sprint 11 branch

on:
  push:
    branches:
      - agent/s11-hardening-pilot
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/s11-hardening-pilot
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm format
      - name: Commit canonical formatting and remove helper
        run: |
          rm .github/workflows/format-s11.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(pilot): format Sprint 11 foundation"
          git push origin HEAD:agent/s11-hardening-pilot
