name: Temporary customer profile failed-step log

on:
  push:
    branches:
      - feat/be-fe-001-customer-profile-update

permissions:
  actions: read
  contents: write

jobs:
  report:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/be-fe-001-customer-profile-update
      - name: Capture failed database log
        run: gh run view 29892688336 --repo thrinnadhh/Vastra --log-failed > profile-db-failed-log.txt
      - run: rm .github/workflows/temporary-profile-failed-log.yml
      - name: Commit diagnostic report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-db-failed-log.txt .github/workflows/temporary-profile-failed-log.yml
          git commit -m "chore(profile): capture failed database step"
          git push origin HEAD:feat/be-fe-001-customer-profile-update
