name: Temporary customer profile lint fix

on:
  push:
    branches:
      - feat/be-fe-001-customer-profile-update

permissions:
  contents: write

jobs:
  lint-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/be-fe-001-customer-profile-update
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vastra/api-client generate
      - name: Apply ESLint fixes
        run: pnpm lint:fix || true
      - run: rm .github/workflows/temporary-profile-lint-fix.yml
      - name: Commit lint fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "BE-FE-001 style(profile): apply repository lint fixes"
          git push origin HEAD:feat/be-fe-001-customer-profile-update
