name: Temporary customer deep-link reformatter

on:
  push:
    branches:
      - feat/ui-fe-s03-production-deep-links

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/ui-fe-s03-production-deep-links
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm format
      - run: rm .github/workflows/temporary-deep-link-reformat.yml
      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "FE-S03-01 style(customer): reformat deep-link recovery"
          git push origin HEAD:feat/ui-fe-s03-production-deep-links
