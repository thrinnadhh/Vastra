name: FE-S03-04 workspace sync

on:
  pull_request:

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'feat/ui-fe-s03-04-location-access'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install
      - run: >-
          pnpm exec prettier --write
          apps/customer-app/package.json
          apps/customer-app/src/location/customer-location.types.ts
          apps/customer-app/src/location/customer-location.types.test.ts
          apps/customer-app/src/location/expo-customer-location.adapter.ts
          apps/customer-app/src/location/api-customer-serviceability.adapter.ts
          apps/customer-app/src/location/api-customer-serviceability.adapter.test.ts
          apps/customer-app/src/location/customer-location.screen.tsx
          apps/customer-app/src/location/customer-location.screen.test.tsx
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/customer-app pnpm-lock.yaml
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore(customer): sync FE-S03-04 location workspace"
          git push
