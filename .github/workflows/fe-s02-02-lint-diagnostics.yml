name: FE-S02-02 coverage diagnostics

on:
  pull_request:
    paths:
      - 'package.json'
      - 'packages/api-client/**'
      - '.github/workflows/fe-s02-02-lint-diagnostics.yml'

permissions:
  contents: read

jobs:
  coverage-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Run API-client coverage
        run: |
          set -o pipefail
          pnpm --filter @vastra/api-client test:coverage | tee fe-s02-02-coverage.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fe-s02-02-coverage
          path: fe-s02-02-coverage.log
          if-no-files-found: error
