name: FE-S04-01 merge lint diagnostic

on:
  pull_request:
    branches:
      - feat/ui-fe-s03-06-root-migration

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'feat/ui-fe-s04-01-home-composition'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture merge-ref lint diagnostics
        run: |
          files=(
            apps/customer-app/App.test.tsx
            apps/customer-app/App.tsx
            apps/customer-app/src/discovery/api-customer-home.adapter.test.ts
            apps/customer-app/src/discovery/api-customer-home.adapter.ts
            apps/customer-app/src/discovery/customer-home.screen.test.tsx
            apps/customer-app/src/discovery/customer-home.screen.tsx
            apps/customer-app/src/discovery/customer-home.types.ts
            apps/customer-app/src/navigation/customer-root-navigation.tsx
            apps/customer-app/src/navigation/default-customer-root-content.tsx
          )
          pnpm exec eslint "${files[@]}" > lint-report.txt 2>&1 || true
          if [ ! -s lint-report.txt ]; then
            echo "Merge-ref lint passed." > lint-report.txt
          fi
          cat lint-report.txt
      - uses: actions/upload-artifact@v6
        with:
          name: fe-s04-01-merge-lint
          path: lint-report.txt
          if-no-files-found: error
