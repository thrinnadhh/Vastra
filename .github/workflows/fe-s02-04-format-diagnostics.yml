name: FE-S02-04 format diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  format-branch:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'feat/ui-fe-s02-04-shared-primitives'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Apply pinned repository formatting
        run: pnpm exec prettier --write packages/ui-primitives docs/design/frontend-shared-primitives.md pnpm-lock.yaml
      - name: Commit formatting result
        shell: bash
        run: |
          git add packages/ui-primitives docs/design/frontend-shared-primitives.md pnpm-lock.yaml
          if git diff --cached --quiet; then
            echo "Formatting already clean."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "FE-S02-04 style(ui): apply repository formatting"
          git push origin HEAD:${{ github.head_ref }}
