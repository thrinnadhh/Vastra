name: FE-S04-02 format

on:
  pull_request:
    branches:
      - feat/ui-fe-s04-01-home-composition-main

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feat/ui-fe-s04-02-search-contract'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format FE-S04-02 files
        run: |
          pnpm exec prettier --write \
            apps/customer-app/App.test.tsx \
            apps/customer-app/App.tsx \
            apps/customer-app/src/discovery/api-customer-search.adapter.test.ts \
            apps/customer-app/src/discovery/api-customer-search.adapter.ts \
            apps/customer-app/src/discovery/customer-search.screen.test.tsx \
            apps/customer-app/src/discovery/customer-search.screen.tsx \
            apps/customer-app/src/discovery/customer-search.types.ts \
            apps/customer-app/src/discovery/default-customer-search.tsx \
            apps/customer-app/src/navigation/default-customer-root-content.tsx \
            docs/design/customer-search-contract.md
          rm .github/workflows/fe-s04-02-format.yml
      - name: Commit formatted files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "style(customer): format FE-S04-02"
          git push
