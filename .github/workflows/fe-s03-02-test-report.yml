name: FE-S03-02 unit report

on:
  pull_request:

permissions:
  contents: read

jobs:
  report:
    if: github.head_ref == 'feat/ui-fe-s03-02-session-bootstrap'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture unit tests
        run: pnpm test > fe-s03-02-tests.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: fe-s03-02-tests
          path: fe-s03-02-tests.txt
