name: FE-S02-05 captain root-test diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  captain-root-test:
    if: github.head_ref == 'feat/ui-fe-s02-05-application-shells'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Capture captain application root test
        shell: bash
        run: |
          set +e
          pnpm --filter @vastra/captain-app exec jest App.test.tsx --runInBand > fe-s02-05-captain-test.log 2>&1
          status=$?
          cat fe-s02-05-captain-test.log
          echo "$status" > fe-s02-05-captain-test.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: fe-s02-05-captain-test-report
          path: |
            fe-s02-05-captain-test.log
            fe-s02-05-captain-test.status
