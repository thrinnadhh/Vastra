name: Finalize Sprint 8 lint fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize-lint:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/s8-03-10-captain-delivery'
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Apply final corrections
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('apps/captain-app/src/delivery/captain-delivery.screen.tsx')
          text = path.read_text()

          old_effect = """    let stop: (() => void) | undefined;
    const lifecycle = { cancelled: false };
    void locationProvider.requestForegroundPermission().then(async (permission) => {
      if (!permission.granted || lifecycle.cancelled) return;
      stop = await locationProvider.watchLocations((sample) => {
        void presenceClient
          .updateLocation({ ...sample, activeDeliveryTaskId: active.taskId })
          .catch(() => undefined);
      });
      if (lifecycle.cancelled) stop();
    });
    return () => {
      lifecycle.cancelled = true;
      stop?.();
    };
"""
          new_effect = """    const subscription = locationProvider.requestForegroundPermission().then(async (permission) => {
      if (!permission.granted) return undefined;
      return locationProvider.watchLocations((sample) => {
        void presenceClient
          .updateLocation({ ...sample, activeDeliveryTaskId: active.taskId })
          .catch(() => undefined);
      });
    });
    return () => {
      void subscription.then((stopWatching) => {
        stopWatching?.();
      });
    };
"""

          old_arrival = """      : run(async () =>
          client.arrivePickup(active.taskId, (await location(true))!, createIdempotencyKey()),
        );
"""
          new_arrival = """      : run(async () => {
          const currentLocation = await location(true);
          if (currentLocation === null) {
            throw new Error('Location is required to confirm store arrival.');
          }
          return client.arrivePickup(active.taskId, currentLocation, createIdempotencyKey());
        });
"""

          for old, new in ((old_effect, new_effect), (old_arrival, new_arrival)):
              if old not in text:
                  raise SystemExit(f'Expected snippet not found: {old[:100]!r}')
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format and lint
        shell: bash
        run: |
          pnpm format
          pnpm lint

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          rm -f .github/workflows/s8-lint-finalize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "fix(delivery): clear remaining Sprint 8 lint errors"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
