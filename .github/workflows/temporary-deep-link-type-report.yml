name: Temporary customer deep-link type report

on:
  push:
    branches:
      - feat/ui-fe-s03-production-deep-links

permissions:
  contents: write

jobs:
  report:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/ui-fe-s03-production-deep-links
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vastra/api-client generate
      - run: pnpm typecheck > deep-link-type-report.txt 2>&1 || true
      - run: rm .github/workflows/temporary-deep-link-type-report.yml
      - name: Commit diagnostic report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deep-link-type-report.txt .github/workflows/temporary-deep-link-type-report.yml
          git commit -m "chore(customer): capture temporary deep-link type diagnostics"
          git push origin HEAD:feat/ui-fe-s03-production-deep-links
