name: FE-S03-02 format

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feat/ui-fe-s03-02-session-bootstrap'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: >-
          pnpm exec prettier --write
          apps/customer-app/src/auth/customer-launch-store.ts
          apps/customer-app/src/auth/customer-session-actions.tsx
          apps/customer-app/src/auth/customer-session-bootstrap.ts
          apps/customer-app/src/auth/customer-session-bootstrap.test.ts
          apps/customer-app/src/auth/customer-session-root.tsx
          apps/customer-app/src/auth/customer-session-root.test.tsx
          apps/customer-app/src/auth/default-customer-session.tsx
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/customer-app/src/auth
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "style(customer): format FE-S03-02 session bootstrap"
          git push
