name: Apply FE-S05-06 review fix

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-review-fix:
    if: github.head_ref == 'agent/fe-s05-06-cod-e2e'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          persist-credentials: true
          ref: ${{ github.head_ref }}

      - name: Move scenario behavior into source
        run: |
          python - <<'PY'
          from pathlib import Path

          scenario = Path('packages/frontend-test-harness/src/customer-cod-checkout-scenario.ts')
          content = scenario.read_text()
          replacements = {
              '<main class="stage" id="scenario-main">': '<main class="stage" id="scenario-main" tabindex="-1">',
              'data-screen="product"\n      data-placement-phase': 'data-current-screen="product"\n      data-placement-phase',
              "document.querySelectorAll('[data-screen]')": "document.querySelectorAll('.screen[data-screen]')",
              'root.dataset.screen = currentScreen;': 'root.dataset.currentScreen = currentScreen;',
          }
          for before, after in replacements.items():
              if before not in content:
                  raise SystemExit(f'Missing expected scenario fragment: {before!r}')
              content = content.replace(before, after, 1)
          scenario.write_text(content)

          index = Path('packages/frontend-test-harness/src/index.ts')
          index.write_text(index.read_text().replace(
              "export * from './customer-cod-checkout-document';",
              "export * from './customer-cod-checkout-scenario';",
          ))

          server = Path('packages/frontend-test-harness/src/server.ts')
          server.write_text(server.read_text().replace(
              "} from './customer-cod-checkout-document';",
              "} from './customer-cod-checkout-scenario';",
          ))
          PY

      - name: Remove wrapper and temporary workflow
        run: |
          git rm packages/frontend-test-harness/src/customer-cod-checkout-document.ts
          git rm .github/workflows/apply-fe-s05-06-review.yml

      - name: Commit review fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "refactor(frontend): remove COD scenario patch wrapper"
          git push origin HEAD:${{ github.head_ref }}
