name: FE-S04-04 unit diagnostic

on:
  pull_request:
    branches:
      - feat/ui-fe-s04-03-shop-experience

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'feat/ui-fe-s04-04-product-detail'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture customer-app unit diagnostics
        shell: bash
        run: |
          set +e
          pnpm --filter @vastra/customer-app test > fe-s04-04-unit.log 2>&1
          status=$?
          echo "exit_status=$status" >> fe-s04-04-unit.log
          exit 0
      - uses: actions/upload-artifact@v6
        with:
          name: fe-s04-04-unit
          path: fe-s04-04-unit.log
