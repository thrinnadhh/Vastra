name: Temporary customer profile OpenAPI patch

on:
  push:
    branches:
      - feat/be-fe-001-customer-profile-update

permissions:
  contents: write

jobs:
  patch-openapi:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/be-fe-001-customer-profile-update
      - name: Patch canonical OpenAPI
        run: python3 scripts/patch-customer-profile-openapi.py
      - name: Remove temporary patch tooling
        run: |
          rm scripts/patch-customer-profile-openapi.py
          rm .github/workflows/temporary-profile-openapi-patch.yml
      - name: Commit canonical contract
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/api/openapi.yaml scripts/patch-customer-profile-openapi.py .github/workflows/temporary-profile-openapi-patch.yml
          git commit -m "BE-FE-001 contract(profile): add customer profile update operation"
          git push origin HEAD:feat/be-fe-001-customer-profile-update
