name: Sprint 5 address repair diagnostics

on:
  pull_request:
    branches:
      - main

concurrency:
  group: sprint-5-address-repair-diagnostics
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'automation/sprint-5-wave-1-implementation'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: automation/sprint-5-wave-1-implementation

      - uses: actions/setup-node@v4
        with:
          node-version: 20.20.2

      - name: Prepare isolated address branch
        shell: bash
        run: |
          git fetch origin main feat/be-fe-002-customer-addresses
          git switch feat/be-fe-002-customer-addresses
          git reset --hard origin/feat/be-fe-002-customer-addresses
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/api/openapi.yaml')
          source = path.read_text(encoding='utf-8')
          source = source.replace(
              '#/components/schemas/ResponseMeta',
              '#/components/schemas/CustomerAddressResponseMeta',
          )
          if '    CustomerAddressResponseMeta:\n' not in source:
              marker = '    CustomerAddress:\n'
              schema = (
                  '    CustomerAddressResponseMeta:\n'
                  '      type: object\n'
                  '      additionalProperties: false\n'
                  '      required: [requestId]\n'
                  '      properties:\n'
                  '        requestId:\n'
                  "          type: ['string', 'null']\n"
                  '          format: uuid\n\n'
              )
              if marker not in source:
                  raise SystemExit('CustomerAddress schema marker not found')
              source = source.replace(marker, schema + marker, 1)
          path.write_text(source, encoding='utf-8')
          PY

      - name: Capture generator, formatter, and linter diagnostics
        shell: bash
        run: |
          mkdir -p /tmp/address-diagnostics
          corepack enable
          corepack prepare pnpm@8.15.0 --activate
          pnpm install --frozen-lockfile > /tmp/address-diagnostics/install.log 2>&1

          set +e
          pnpm --filter @vastra/api-client generate > /tmp/address-diagnostics/generate.log 2>&1
          echo $? > /tmp/address-diagnostics/generate.exit

          pnpm exec prettier --write \
            apps/backend/src/addresses/*.ts \
            apps/backend/src/app.module.ts \
            docs/api/openapi.yaml \
            docs/design/customer-address-contract.md \
            packages/api-client/src/generated/openapi.ts \
            > /tmp/address-diagnostics/prettier.log 2>&1
          echo $? > /tmp/address-diagnostics/prettier.exit

          pnpm exec eslint --fix apps/backend/src/addresses/*.ts apps/backend/src/app.module.ts \
            > /tmp/address-diagnostics/eslint.log 2>&1
          echo $? > /tmp/address-diagnostics/eslint.exit

          pnpm --filter @vastra/backend exec vitest run src/addresses \
            > /tmp/address-diagnostics/focused-tests.log 2>&1
          echo $? > /tmp/address-diagnostics/focused-tests.exit

          pnpm openapi:check > /tmp/address-diagnostics/openapi-check.log 2>&1
          echo $? > /tmp/address-diagnostics/openapi-check.exit

          git status --short > /tmp/address-diagnostics/status.txt
          git diff > /tmp/address-diagnostics/working.diff
          set -e

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s05-address-repair-diagnostics
          path: /tmp/address-diagnostics
          if-no-files-found: error
