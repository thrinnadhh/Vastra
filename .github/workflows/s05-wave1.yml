name: Sprint 5 Wave 1 diagnostics

on:
  push:
    branches:
      - automation/sprint-5-wave-1-implementation
  pull_request:
    branches:
      - main

concurrency:
  group: sprint-5-wave-1-diagnostics
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  diagnose:
    name: diagnose-${{ matrix.ticket }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        ticket: [cart, orders]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: automation/sprint-5-wave-1-implementation

      - uses: actions/setup-node@v4
        with:
          node-version: 20.20.2

      - name: Prepare isolated ticket branch
        shell: bash
        run: |
          cat scripts/s05-wave1.payload.* | base64 -d | xz -d > /tmp/s05-wave1-implement.py
          python scripts/s05-wave1-hotfix.py /tmp/s05-wave1-implement.py
          branch="feat/ui-fe-s05-01-cart"
          if test "${{ matrix.ticket }}" = orders; then branch="feat/ui-fe-s05-05-orders-tracking"; fi
          git fetch origin main "$branch"
          test "$(git rev-parse origin/main)" = "$(git merge-base origin/main origin/$branch)"
          git switch "$branch"
          git reset --hard "origin/$branch"
          test -z "$(git status --short)"
          python /tmp/s05-wave1-implement.py "${{ matrix.ticket }}"

      - name: Install and format
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@8.15.0 --activate
          pnpm install --frozen-lockfile
          mapfile -d '' changed < <(git diff --name-only -z)
          if ((${#changed[@]})); then pnpm exec prettier --write "${changed[@]}"; fi

      - name: Focused tests
        id: focused
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p /tmp/s05-diagnostics
          set -o pipefail
          if test "${{ matrix.ticket }}" = cart; then
            pnpm --filter @vastra/customer-app exec jest src/cart --runInBand 2>&1 | tee /tmp/s05-diagnostics/focused.log
          else
            pnpm --filter @vastra/customer-app exec jest src/orders --runInBand 2>&1 | tee /tmp/s05-diagnostics/focused.log
          fi

      - name: Cart repository validation
        if: matrix.ticket == 'cart' && steps.focused.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          for command in \
            "pnpm format:check" \
            "pnpm lint" \
            "pnpm typecheck" \
            "pnpm test" \
            "pnpm test:integration" \
            "pnpm db:test" \
            "pnpm openapi:check" \
            "pnpm build"
          do
            slug=$(printf '%s' "$command" | tr ' /:' '___')
            echo "## $command" | tee -a /tmp/s05-diagnostics/validation-summary.md
            if bash -lc "$command" 2>&1 | tee "/tmp/s05-diagnostics/${slug}.log"; then
              echo PASS | tee -a /tmp/s05-diagnostics/validation-summary.md
            else
              echo FAIL | tee -a /tmp/s05-diagnostics/validation-summary.md
            fi
          done

      - name: Capture boundary diagnostics
        if: always()
        shell: bash
        run: |
          mkdir -p /tmp/s05-diagnostics
          git status --short > /tmp/s05-diagnostics/status.txt
          git diff --name-only origin/main > /tmp/s05-diagnostics/changed-files.txt
          git diff --stat origin/main > /tmp/s05-diagnostics/diff-stat.txt
          python /tmp/s05-wave1-implement.py verify "${{ matrix.ticket }}" > /tmp/s05-diagnostics/boundary.txt 2>&1 || true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s05-${{ matrix.ticket }}-diagnostics
          path: /tmp/s05-diagnostics
          if-no-files-found: error
