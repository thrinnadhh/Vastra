name: Sprint 5 PR repair

on:
  pull_request:
    branches:
      - main

concurrency:
  group: sprint-5-pr-repair
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'automation/sprint-5-wave-1-implementation'
    name: repair-${{ matrix.ticket }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - ticket: addresses
            branch: feat/be-fe-002-customer-addresses
          - ticket: quote
            branch: feat/ui-fe-s05-03-quote-fees

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: automation/sprint-5-wave-1-implementation

      - uses: actions/setup-node@v4
        with:
          node-version: 20.20.2

      - name: Prepare isolated ticket branch
        shell: bash
        env:
          BRANCH: ${{ matrix.branch }}
          TICKET: ${{ matrix.ticket }}
        run: |
          git config user.name "Vastra Sprint 5 Repair"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin main "$BRANCH"
          test "$(git merge-base origin/main origin/$BRANCH)" = "$(git rev-parse origin/main)"
          git switch "$BRANCH"
          git reset --hard "origin/$BRANCH"
          test -z "$(git status --short)"

          if test "$TICKET" = addresses; then
            python - <<'PY'
          from pathlib import Path

          path = Path('docs/api/openapi.yaml')
          source = path.read_text(encoding='utf-8')
          source = source.replace(
              "#/components/schemas/ResponseMeta",
              "#/components/schemas/CustomerAddressResponseMeta",
          )
          if '    CustomerAddressResponseMeta:\n' not in source:
              marker = '    CustomerAddress:\n'
              schema = """    CustomerAddressResponseMeta:
              type: object
              additionalProperties: false
              required: [requestId]
              properties:
                requestId:
                  type: ['string', 'null']
                  format: uuid

          """
              if marker not in source:
                  raise SystemExit('CustomerAddress schema marker not found')
              source = source.replace(marker, schema + marker, 1)
          path.write_text(source, encoding='utf-8')
          PY
          fi

      - name: Install, generate, format, and autofix
        shell: bash
        env:
          TICKET: ${{ matrix.ticket }}
        run: |
          corepack enable
          corepack prepare pnpm@8.15.0 --activate
          pnpm install --frozen-lockfile

          if test "$TICKET" = addresses; then
            pnpm --filter @vastra/api-client generate
            pnpm exec prettier --write \
              apps/backend/src/addresses/*.ts \
              apps/backend/src/app.module.ts \
              docs/api/openapi.yaml \
              docs/design/customer-address-contract.md \
              packages/api-client/src/generated/openapi.ts
            pnpm exec eslint --fix apps/backend/src/addresses/*.ts apps/backend/src/app.module.ts
          else
            pnpm exec prettier --write \
              apps/customer-app/src/checkout/customer-checkout-quote.screen.tsx \
              apps/customer-app/src/checkout/customer-checkout-quote.screen.test.tsx \
              docs/design/customer-checkout-quote.md
            pnpm exec eslint --fix \
              apps/customer-app/src/checkout/customer-checkout-quote.screen.tsx \
              apps/customer-app/src/checkout/customer-checkout-quote.screen.test.tsx
          fi

      - name: Validate repair
        shell: bash
        env:
          TICKET: ${{ matrix.ticket }}
        run: |
          if test "$TICKET" = addresses; then
            pnpm --filter @vastra/backend exec vitest run src/addresses
            pnpm format:check
            pnpm lint
            pnpm typecheck
            pnpm openapi:check
            pnpm build
          else
            pnpm --filter @vastra/customer-app exec jest src/checkout/customer-checkout-quote --runInBand
            pnpm format:check
            pnpm lint
            pnpm typecheck
          fi

      - name: Verify ownership and push amended ticket commit
        shell: bash
        env:
          BRANCH: ${{ matrix.branch }}
          TICKET: ${{ matrix.ticket }}
        run: |
          python - <<'PY'
          import os
          import subprocess

          ticket = os.environ['TICKET']
          allowed = {
              'quote': (
                  'apps/customer-app/src/checkout/customer-checkout-quote.',
                  'docs/design/customer-checkout-quote.md',
              ),
              'addresses': (
                  'apps/backend/src/addresses/',
                  'apps/backend/src/app.module.ts',
                  'docs/api/openapi.yaml',
                  'docs/design/customer-address-contract.md',
                  'supabase/migrations/20260722120000_customer_address_contract.sql',
                  'supabase/tests/0092_customer_address_contract.test.sql',
                  'packages/api-client/src/generated/',
              ),
          }[ticket]
          changed = subprocess.check_output(
              ['git', 'diff', '--name-only', 'origin/main...HEAD'], text=True
          ).splitlines()
          working = subprocess.check_output(
              ['git', 'ls-files', '--modified', '--others', '--exclude-standard'], text=True
          ).splitlines()
          paths = sorted(set(changed + working))
          foreign = [path for path in paths if not any(path == prefix or path.startswith(prefix) for prefix in allowed)]
          if foreign:
              raise SystemExit(f'{ticket}: foreign-owned files: {foreign}')
          print(f'{ticket}: verified {len(paths)} owned files')
          PY

          git add --all
          git diff --cached --check
          git commit --amend --no-edit
          git push --force-with-lease origin "HEAD:$BRANCH"
