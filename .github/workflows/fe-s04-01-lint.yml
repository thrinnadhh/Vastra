name: FE-S04-01 lint repair

on:
  push:
    branches:
      - feat/ui-fe-s04-01-home-composition

permissions:
  contents: write

jobs:
  lint-repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Autofix and capture remaining lint diagnostics
        run: |
          files=(
            apps/customer-app/App.test.tsx
            apps/customer-app/App.tsx
            apps/customer-app/src/discovery/api-customer-home.adapter.test.ts
            apps/customer-app/src/discovery/api-customer-home.adapter.ts
            apps/customer-app/src/discovery/customer-home.screen.test.tsx
            apps/customer-app/src/discovery/customer-home.screen.tsx
            apps/customer-app/src/discovery/customer-home.types.ts
            apps/customer-app/src/navigation/customer-root-navigation.tsx
            apps/customer-app/src/navigation/default-customer-root-content.tsx
          )
          pnpm exec eslint "${files[@]}" --fix || true
          pnpm exec eslint "${files[@]}" > docs/design/fe-s04-01-lint-report.txt 2>&1 || true
          if [ ! -s docs/design/fe-s04-01-lint-report.txt ]; then
            echo "Lint passed after scoped autofix." > docs/design/fe-s04-01-lint-report.txt
          fi
          pnpm exec prettier --write "${files[@]}" docs/design/fe-s04-01-lint-report.txt
          rm .github/workflows/fe-s04-01-lint.yml
      - name: Commit lint repair and diagnostics
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "style(customer): apply FE-S04-01 lint repair"
          git push
