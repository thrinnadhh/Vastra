name: Materialize FE-S1R formatting

on:
  push:
    branches:
      - agent/fe-s1r-design-system-closure
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    name: Format FE-S1R files
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format Sprint 1R files
        run: |
          pnpm exec prettier --write \
            design-system/vastra/MASTER.md \
            docs/evidence/fe-s1r-design-system.md \
            packages/design-tokens/README.md \
            packages/design-tokens/src/colors.ts \
            packages/design-tokens/src/design-tokens.test.ts \
            packages/design-tokens/src/foundations.ts \
            packages/design-tokens/src/index.ts \
            packages/design-tokens/src/presentation.ts \
            packages/design-tokens/src/theme.ts

      - name: Stage formatted artifact
        run: |
          mkdir -p formatted
          cp --parents \
            design-system/vastra/MASTER.md \
            docs/evidence/fe-s1r-design-system.md \
            packages/design-tokens/README.md \
            packages/design-tokens/src/colors.ts \
            packages/design-tokens/src/design-tokens.test.ts \
            packages/design-tokens/src/foundations.ts \
            packages/design-tokens/src/index.ts \
            packages/design-tokens/src/presentation.ts \
            packages/design-tokens/src/theme.ts \
            formatted/

      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: fe-s1r-formatted-${{ github.run_attempt }}
          path: formatted
          if-no-files-found: error
          retention-days: 1
