name: FE-S03-06 format

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feat/ui-fe-s03-06-root-migration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: >-
          pnpm exec prettier --write
          apps/customer-app/App.test.tsx
          apps/customer-app/App.tsx
          apps/customer-app/src/api/use-customer-api-client.ts
          apps/customer-app/src/navigation/customer-root-navigation.tsx
          apps/customer-app/src/navigation/default-customer-root-content.tsx
          docs/design/customer-root-migration.md
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/customer-app docs/design/customer-root-migration.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "style(customer): format FE-S03-06 root migration"
          git push
