name: FE-S02-06 materialize harness

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: fe-s02-06-materialize-${{ github.ref }}
  cancel-in-progress: false

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'feat/ui-fe-s02-06-frontend-test-harness'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out ticket branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Materialize deterministic harness files
        run: |
          tar -xJf .fe-s02-06/payload.tar.xz -C .
          rm -rf .fe-s02-06

      - name: Synchronize workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Format ticket files
        run: |
          pnpm exec prettier --write \
            package.json \
            eslint.config.mjs \
            playwright.config.ts \
            'packages/frontend-test-harness/**/*.{ts,json}' \
            'e2e/**/*.{ts,json}' \
            docs/design/frontend-test-harness.md \
            pnpm-lock.yaml

      - name: Validate deterministic fixtures
        run: pnpm test:frontend:fixtures

      - name: Generate Chromium visual hashes
        run: pnpm test:frontend:visual:update

      - name: Commit ticket implementation
        run: |
          git restore --source=HEAD -- .github/workflows/ci.yml
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'FE-S02-06 feat(testing): establish frontend test harness'
          git push origin HEAD:${{ github.head_ref }}
