name: Publish FE-S05-04 fixes

on:
  push:
    branches:
      - automation/materialize-fe-s05-s07

concurrency:
  group: publish-fe-s05-04-fixes
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out publisher assets
        uses: actions/checkout@v7
        with:
          ref: automation/materialize-fe-s05-s07
          path: publisher
          persist-credentials: false
      - name: Check out product branch
        uses: actions/checkout@v7
        with:
          ref: agent/fe-s05-04-confirmation
          path: product
          fetch-depth: 0
          persist-credentials: true
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8.15.0
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: product/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: product
        run: pnpm install --frozen-lockfile
      - name: Apply reviewed fixes
        working-directory: product
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "0cf6ad7d18ab395f2527c5651b960a0287ca02eb"
          base64 --decode \
            ../publisher/.github/automation/pr122-fixes.patch.gz.b64 \
            | gzip --decompress > /tmp/pr122-fixes.patch
          git apply --check /tmp/pr122-fixes.patch
          git apply /tmp/pr122-fixes.patch
          pnpm exec prettier --write \
            apps/customer-app/App.test.tsx \
            apps/customer-app/src/addresses/customer-addresses.screen.test.tsx \
            apps/customer-app/src/addresses/customer-addresses.screen.tsx \
            apps/customer-app/src/checkout/customer-checkout-quote.screen.test.tsx
          git diff --check
      - name: Publish product commit
        working-directory: product
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "vastra-orchestrator"
          git config user.email "actions@users.noreply.github.com"
          git add \
            apps/customer-app/App.test.tsx \
            apps/customer-app/src/addresses/customer-addresses.screen.test.tsx \
            apps/customer-app/src/addresses/customer-addresses.screen.tsx \
            apps/customer-app/src/checkout/customer-checkout-quote.screen.test.tsx
          git diff --cached --check
          git commit -m "fix(customer): harden checkout privacy and CI coverage"
          git push origin HEAD:agent/fe-s05-04-confirmation
