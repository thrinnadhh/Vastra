name: Materialize exact toolchain

on:
  push:
    branches:
      - automation/materialize-fe-s05-s07

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Use repository Node version
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
      - name: Use repository pnpm version
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@8.15.0 --activate
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Package toolchain and dependencies
        shell: bash
        run: |
          node_root="$(dirname "$(dirname "$(command -v node)")")"
          tar -czf /tmp/node20-toolchain.tar.gz -C "$node_root" .
          tar -czf /tmp/vastra-dependencies.tar.gz node_modules
      - name: Upload toolchain
        uses: actions/upload-artifact@v4
        with:
          name: node20-toolchain
          path: /tmp/node20-toolchain.tar.gz
          if-no-files-found: error
          retention-days: 1
      - name: Upload dependencies
        uses: actions/upload-artifact@v4
        with:
          name: vastra-dependencies
          path: /tmp/vastra-dependencies.tar.gz
          if-no-files-found: error
          retention-days: 1
