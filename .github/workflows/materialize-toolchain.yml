name: Materialize exact toolchain

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - automation/materialize-fe-s05-s07

permissions:
  contents: read

jobs:
  package:
    if: github.head_ref == 'automation/materialize-fe-s05-s07' || github.ref == 'refs/heads/automation/materialize-fe-s05-s07'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Use repository Node version
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
      - name: Use repository pnpm version
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@8.15.0 --activate
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Package toolchain and workspace dependencies
        shell: bash
        run: |
          node_root="$(dirname "$(dirname "$(command -v node)")")"
          tar -czf /tmp/node20-toolchain.tar.gz -C "$node_root" .
          mapfile -d '' node_modules_dirs < <(find . -type d -name node_modules -prune -print0)
          test "${#node_modules_dirs[@]}" -gt 1
          tar -czf /tmp/vastra-workspace-dependencies.tar.gz "${node_modules_dirs[@]}"
      - name: Upload toolchain
        uses: actions/upload-artifact@v4
        with:
          name: node20-toolchain
          path: /tmp/node20-toolchain.tar.gz
          if-no-files-found: error
          retention-days: 1
      - name: Upload dependencies
        uses: actions/upload-artifact@v4
        with:
          name: vastra-workspace-dependencies
          path: /tmp/vastra-workspace-dependencies.tar.gz
          if-no-files-found: error
          retention-days: 1
