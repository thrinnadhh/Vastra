name: Extract FE-S05-04 unit failure

on:
  push:
    branches:
      - automation/materialize-fe-s05-s07

permissions:
  actions: read
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: true
      - name: Download and retain failure tail
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_ID: '89272925879'
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" \
            --output /tmp/unit-job.log
          tail -n 350 /tmp/unit-job.log > .github/automation/unit-job-89272925879-tail.txt
          git config user.name 'vastra-orchestrator'
          git config user.email 'actions@users.noreply.github.com'
          git add .github/automation/unit-job-89272925879-tail.txt
          git commit -m 'chore(automation): retain unit failure tail'
          git push origin HEAD:automation/materialize-fe-s05-s07
