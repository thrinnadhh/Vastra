name: FE-S03-05 lint report

on:
  pull_request:

permissions:
  contents: read

jobs:
  report:
    if: github.head_ref == 'feat/ui-fe-s03-05-profile-preferences'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture lint
        run: pnpm lint > fe-s03-05-lint.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: fe-s03-05-lint
          path: fe-s03-05-lint.txt
