name: Format materializer workflow

on:
  push:
    branches:
      - automation/materialize-fe-s05-s07

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out materializer branch
        uses: actions/checkout@v7
        with:
          ref: automation/materialize-fe-s05-s07
          fetch-depth: 0
          persist-credentials: true
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8.15.0
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Format workflow files
        run: |
          pnpm exec prettier --write \
            .github/workflows/format-materializer.yml \
            .github/workflows/materialize-toolchain.yml
      - name: Commit canonical formatting
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'vastra-orchestrator'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            .github/workflows/format-materializer.yml \
            .github/workflows/materialize-toolchain.yml
          git diff --cached --check
          git commit -m 'chore(ci): apply canonical workflow formatting'
          git push origin HEAD:automation/materialize-fe-s05-s07
