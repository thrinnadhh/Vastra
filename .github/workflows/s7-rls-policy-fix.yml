name: S7 RLS Policy Fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    name: Apply RLS policy fix
    runs-on: ubuntu-latest

    steps:
      - name: Check out Sprint 7 branch
        uses: actions/checkout@v7
        with:
          ref: feat/s7-01-05-merchant-alert-delivery-foundation

      - name: Add service-role-only policy and coverage
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          migration_path = Path('supabase/migrations/20260717103000_merchant_alert_delivery_foundation.sql')
          migration = migration_path.read_text()
          anchor = """alter table public.merchant_alert_delivery_attempts enable row level security;
alter table public.merchant_alert_delivery_attempts force row level security;
"""
          replacement = """alter table public.merchant_alert_delivery_attempts enable row level security;
alter table public.merchant_alert_delivery_attempts force row level security;

create policy merchant_alert_delivery_attempts_service_role_access
on public.merchant_alert_delivery_attempts
for all
to service_role
using (true)
with check (true);
"""
          if anchor not in migration:
              raise SystemExit('migration RLS anchor not found')
          migration_path.write_text(migration.replace(anchor, replacement, 1))

          test_path = Path('supabase/tests/0036_merchant_alert_delivery_foundation.test.sql')
          test = test_path.read_text()
          if 'select plan(16);' not in test:
              raise SystemExit('pgTAP plan anchor not found')
          test = test.replace('select plan(16);', 'select plan(17);', 1)
          test_anchor = """select ok(
  (
    select relrowsecurity and relforcerowsecurity
    from pg_class
    where oid = 'public.merchant_alert_delivery_attempts'::regclass
  ),
  'delivery attempts enforce row level security'
);
"""
          policy_assertion = test_anchor + """
select ok(
  exists (
    select 1
    from pg_policy policy
    join pg_class relation
      on relation.oid = policy.polrelid
    join pg_namespace namespace
      on namespace.oid = relation.relnamespace
    where namespace.nspname = 'public'
      and relation.relname = 'merchant_alert_delivery_attempts'
      and policy.polname = 'merchant_alert_delivery_attempts_service_role_access'
      and cardinality(policy.polroles) = 1
      and (
        select oid
        from pg_roles
        where rolname = 'service_role'
      ) = any(policy.polroles)
  ),
  'delivery attempts have an explicit service-role-only policy'
);
"""
          if test_anchor not in test:
              raise SystemExit('pgTAP RLS assertion anchor not found')
          test_path.write_text(test.replace(test_anchor, policy_assertion, 1))

          for path in (
              Path('.github/workflows/s7-db-capture.yml'),
              Path('.github/workflows/s7-rls-policy-fix.yml'),
              Path('docs/implementation/s7-db-output.txt'),
          ):
              if path.exists():
                  path.unlink()
          PY

      - name: Commit focused fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix(db): add Sprint 7 delivery-attempt RLS policy"
          git push origin HEAD:feat/s7-01-05-merchant-alert-delivery-foundation
