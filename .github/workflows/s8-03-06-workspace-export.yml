name: S8-03-06 workspace export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export-workspace:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Package workspace
        shell: bash
        run: |
          tar --exclude=.git --exclude=node_modules -czf /tmp/s8-03-06-workspace.tar.gz .

      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: s8-03-06-workspace
          path: /tmp/s8-03-06-workspace.tar.gz
          if-no-files-found: error
          retention-days: 1
