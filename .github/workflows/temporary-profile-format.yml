name: Temporary customer profile formatter

on:
  push:
    branches:
      - feat/be-fe-001-customer-profile-update

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/be-fe-001-customer-profile-update
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Format branch
        run: pnpm format
      - name: Remove temporary workflow
        run: rm .github/workflows/temporary-profile-format.yml
      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "BE-FE-001 style(profile): format profile update slice"
          git push origin HEAD:feat/be-fe-001-customer-profile-update
