name: Publish FE-S05-02 review fix

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - automation/materialize-fe-s05-s07

permissions:
  contents: write

concurrency:
  group: publish-fe-s05-02-review-fix
  cancel-in-progress: true

jobs:
  publish:
    if: github.repository == 'thrinnadhh/Vastra' && (github.head_ref == 'automation/materialize-fe-s05-s07' || github.ref == 'refs/heads/automation/materialize-fe-s05-s07')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out audited payload
        uses: actions/checkout@v7
        with:
          ref: automation/materialize-fe-s05-s07
          path: payload
          persist-credentials: false

      - name: Reconstruct and verify review fix
        shell: bash
        run: |
          set -euo pipefail
          cp payload/.github/automation/fe-s05-02-review-fix.patch.gz.b64 /tmp/fe-s05-02-review-fix.patch.gz.b64
          echo 'c4eea4199796b49b15524c9e975c46ea332219f3bcb8b30c4fb2521f044893b6  /tmp/fe-s05-02-review-fix.patch.gz.b64' | sha256sum --check --strict
          base64 --decode /tmp/fe-s05-02-review-fix.patch.gz.b64 | gzip --decompress > /tmp/fe-s05-02-review-fix.patch

      - name: Check out FE-S05-02 branch
        uses: actions/checkout@v7
        with:
          ref: feat/fe-s05-02-address-ui
          fetch-depth: 0
          path: address

      - name: Publish review fix as non-force fast-forward
        shell: bash
        run: |
          set -euo pipefail
          cd address
          git config user.name 'Trinadh B'
          git config user.email '111868359+thrinnadhh@users.noreply.github.com'
          git am /tmp/fe-s05-02-review-fix.patch
          git diff --check origin/feat/fe-s05-02-address-ui..HEAD
          git push origin HEAD:refs/heads/feat/fe-s05-02-address-ui
