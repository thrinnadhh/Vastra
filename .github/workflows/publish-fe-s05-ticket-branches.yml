name: Publish FE-S05 ticket branches

on:
  push:
    branches:
      - automation/materialize-fe-s05-s07

permissions:
  contents: write

concurrency:
  group: publish-fe-s05-ticket-branches
  cancel-in-progress: true

jobs:
  publish:
    if: github.repository == 'thrinnadhh/Vastra'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out audited payloads
        uses: actions/checkout@v7
        with:
          ref: automation/materialize-fe-s05-s07
          path: payload
          persist-credentials: false

      - name: Detect complete payload set
        id: payloads
        shell: bash
        run: |
          if [[ -f payload/.github/automation/fe-s05-02.patch.b64 && -f payload/.github/automation/fe-s05-05.patch.b64 ]]; then
            echo 'ready=true' >> "$GITHUB_OUTPUT"
          else
            echo 'ready=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Check out main for address ticket
        if: steps.payloads.outputs.ready == 'true'
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          path: address

      - name: Publish FE-S05-02 as a non-force fast-forward
        if: steps.payloads.outputs.ready == 'true'
        shell: bash
        run: |
          base64 --decode payload/.github/automation/fe-s05-02.patch.b64 > /tmp/fe-s05-02.patch
          cd address
          git switch -c feat/fe-s05-02-address-ui
          git am /tmp/fe-s05-02.patch
          git diff --check origin/main..HEAD
          git push origin HEAD:refs/heads/feat/fe-s05-02-address-ui

      - name: Check out main for orders ticket
        if: steps.payloads.outputs.ready == 'true'
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          path: orders

      - name: Publish FE-S05-05 as a non-force fast-forward
        if: steps.payloads.outputs.ready == 'true'
        shell: bash
        run: |
          base64 --decode payload/.github/automation/fe-s05-05.patch.b64 > /tmp/fe-s05-05.patch
          cd orders
          git switch -c feat/ui-fe-s05-05-orders-tracking
          git am /tmp/fe-s05-05.patch
          git diff --check origin/main..HEAD
          git push origin HEAD:refs/heads/feat/ui-fe-s05-05-orders-tracking
