name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify repository
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Validate environment templates
        run: pnpm env:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run unit tests
        id: unit-tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee /tmp/s8-unit-tests.log

      - name: Upload failed unit-test report
        if: steps.unit-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: s8-unit-test-diagnostics
          path: /tmp/s8-unit-tests.log
          if-no-files-found: error
          retention-days: 1

      - name: Stop after failed unit tests
        if: steps.unit-tests.outcome == 'failure'
        run: exit 1

      - name: Run integration tests
        run: pnpm test:integration

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Run database tests
        run: pnpm db:test

      - name: Validate OpenAPI
        run: pnpm openapi:check

      - name: Build
        run: pnpm build
