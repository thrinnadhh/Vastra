name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: s10-lint-fix-captain-finance
  cancel-in-progress: true

jobs:
  fix:
    name: Fix S10-11 lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/s10-11-captain-finance
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec eslint . --fix
      - run: pnpm lint
      - name: Restore normal CI and commit lint fixes
        shell: bash
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix: satisfy S10-11 lint"
          git push origin HEAD:feat/s10-11-captain-finance
