name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify repository
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Validate environment templates
        run: pnpm env:check

      - name: Test Sprint 11 pilot tooling
        run: pnpm test:pilot-tooling

      - name: Validate Sprint 11 evidence structure
        run: pnpm pilot:evidence:check

      - name: Scan client apps for privileged secrets
        run: pnpm security:client-secrets

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Run integration tests
        run: pnpm test:integration

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Run database tests
        run: pnpm db:test

      - name: Validate OpenAPI
        run: pnpm openapi:check

      - name: Build
        run: pnpm build
