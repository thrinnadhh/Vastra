name: CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: s8-02-finalize-${{ github.ref }}
  cancel-in-progress: false

jobs:
  finalize:
    name: Finalize S8-02 implementation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out Sprint 8 branch
        uses: actions/checkout@v7
        with:
          ref: agent/s8-02-captain-availability-location
          persist-credentials: true
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify and apply readable patch
        shell: bash
        run: |
          set -euo pipefail
          cat tmp/s8-02.patch.part-{00..11} > /tmp/s8-02.patch
          git apply --check /tmp/s8-02.patch
          git apply /tmp/s8-02.patch
          git diff --check

      - name: Resolve workspace lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Format supported touched files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR |
              grep -E '\.(ts|tsx|json|md|ya?ml)$' |
              grep -v '^pnpm-lock.yaml$'
          )
          if (( ${#files[@]} > 0 )); then
            pnpm exec prettier --write "${files[@]}"
          fi
          git diff --check

      - name: Commit implementation and remove staging files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf tmp
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(captain): implement S8-02 availability and location"
          git push origin HEAD:agent/s8-02-captain-availability-location
