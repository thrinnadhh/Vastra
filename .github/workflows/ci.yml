name: CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: s7-trusted-openapi-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fix:
    name: Fix Sprint 7 OpenAPI placement
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out Sprint 7 branch
        uses: actions/checkout@v7
        with:
          ref: feat/s7-06-10-merchant-alert-runtime

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reindent OpenAPI additions
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('docs/api/openapi.yaml')
          text = path.read_text()

          schema_start = text.index('MerchantAlertDeliveryMetrics:\n')
          schema_end = text.index('security:\n', schema_start)
          schema_block = text[schema_start:schema_end]
          schema_block = ''.join(
              ('    ' + line if line.strip() else line)
              for line in schema_block.splitlines(keepends=True)
          )
          text = text[:schema_start] + schema_block + text[schema_end:]

          path_start = text.index('/admin/merchant-alerts/metrics:\n')
          path_block = text[path_start:]
          path_block = ''.join(
              ('  ' + line if line.strip() else line)
              for line in path_block.splitlines(keepends=True)
          )
          text = text[:path_start] + path_block
          path.write_text(text)
          PY

      - name: Format OpenAPI contract
        run: pnpm exec prettier --write docs/api/openapi.yaml

      - name: Validate OpenAPI contract
        run: pnpm openapi:check

      - name: Restore CI and commit fix
        shell: bash
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/api/openapi.yaml .github/workflows/ci.yml
          git commit -m "fix(api): nest merchant alert observability contract"
          git push origin HEAD:feat/s7-06-10-merchant-alert-runtime
