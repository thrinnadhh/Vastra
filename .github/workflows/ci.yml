name: CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: s7-trusted-mobile-lint-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fix:
    name: Apply Sprint 7 mobile lint fixes
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out Sprint 7 branch
        uses: actions/checkout@v7
        with:
          ref: feat/s7-06-10-merchant-alert-runtime

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply source fixes
        run: python3 .github/scripts/s7_mobile_lint_fix.py

      - name: Format repository
        run: pnpm format

      - name: Restore CI and commit fixes
        shell: bash
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/s7-lint-capture.yml
          rm -f .github/workflows/s7-mobile-lint-fix-push.yml
          rm -f .github/scripts/s7_mobile_lint_fix.py
          rm -f docs/implementation/s7-lint-output.txt
          rm -f docs/implementation/s7-lint-fix-trigger.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix(merchant): satisfy urgent alert lint contracts"
          git push origin HEAD:feat/s7-06-10-merchant-alert-runtime
