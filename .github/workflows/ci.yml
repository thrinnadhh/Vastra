name: CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: s7-trusted-lint-capture-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  capture:
    name: Capture remaining Sprint 7 lint diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out Sprint 7 branch
        uses: actions/checkout@v7
        with:
          ref: feat/s7-06-10-merchant-alert-runtime

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture lint output
        shell: bash
        run: |
          set +e
          pnpm lint > docs/implementation/s7-lint-output.txt 2>&1
          status=$?
          set -e
          printf '\nLINT_EXIT_CODE=%s\n' "$status" >> docs/implementation/s7-lint-output.txt

      - name: Restore CI and commit diagnostic
        shell: bash
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs/implementation/s7-lint-output.txt
          git add .github/workflows/ci.yml
          git commit -m "chore: capture remaining Sprint 7 lint diagnostics"
          git push origin HEAD:feat/s7-06-10-merchant-alert-runtime
