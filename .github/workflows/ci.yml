name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Start Supabase
        run: supabase start

      - name: Reset database and apply migrations
        run: supabase db reset --local

      - name: Run legacy pgTAP contracts 0001-0010
        shell: bash
        run: |
          shopt -s nullglob
          files=()
          for number in $(seq -w 1 10); do
            files+=(supabase/tests/00${number}_*.sql)
          done
          supabase test db "${files[@]}" --local

      - name: Run legacy pgTAP contracts 0011-0020
        shell: bash
        run: |
          shopt -s nullglob
          files=()
          for number in $(seq -w 11 20); do
            files+=(supabase/tests/00${number}_*.sql)
          done
          supabase test db "${files[@]}" --local

      - name: Stop Supabase
        if: always()
        run: supabase stop
