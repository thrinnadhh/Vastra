name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: s9-format-order-operations
  cancel-in-progress: true

jobs:
  format:
    name: Format S9 order operations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out order operations branch
        uses: actions/checkout@v7
        with:
          ref: agent/s9-order-operations
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format ticket files
        run: pnpm format

      - name: Restore normal CI and commit formatting
        shell: bash
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore: format S9-04 and S9-05"
          git push origin HEAD:agent/s9-order-operations
