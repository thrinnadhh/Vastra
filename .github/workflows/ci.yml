name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Diagnose customer profile database test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Run database diagnostic
        shell: bash
        run: |
          set +e
          bash scripts/run-db-tests.sh > /tmp/profile-db.log 2>&1
          status=$?
          echo "--- profile database failure summary ---"
          grep -n -E '0091_customer_profile_update|not ok|Bail out|ERROR|Error|error|failed|Failed' /tmp/profile-db.log | tail -n 60 || true
          echo "--- final database output ---"
          tail -n 80 /tmp/profile-db.log
          exit "$status"
