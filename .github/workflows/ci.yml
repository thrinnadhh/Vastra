name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Diagnose customer profile database test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Start and reset local database
        shell: bash
        run: |
          supabase start > /tmp/profile-db-start.log 2>&1
          supabase db reset --local > /tmp/profile-db-reset.log 2>&1

      - name: Run customer profile pgTAP diagnostic
        shell: bash
        run: |
          set +e
          supabase test db supabase/tests/0091_customer_profile_update.test.sql --local > /tmp/profile-db-test.log 2>&1
          status=$?
          cat /tmp/profile-db-test.log
          exit "$status"
