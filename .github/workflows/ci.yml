name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    name: Diagnose S10-11 database
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - uses: supabase/setup-cli@v3
        with:
          version: 2.109.1
      - name: Capture database report
        id: database
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm db:test 2>&1 | tee /tmp/s10-11-db.log
      - uses: actions/upload-artifact@v4
        with:
          name: s10-11-db
          path: /tmp/s10-11-db.log
          retention-days: 1
      - if: steps.database.outcome == 'failure'
        run: exit 1
