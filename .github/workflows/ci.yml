name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Start Supabase
        run: supabase start

      - name: Reset database and apply migrations
        run: supabase db reset --local

      - name: Run legacy pgTAP contract 0011
        run: supabase test db supabase/tests/0011_*.sql --local

      - name: Run legacy pgTAP contract 0012
        run: supabase test db supabase/tests/0012_*.sql --local

      - name: Run legacy pgTAP contract 0013
        run: supabase test db supabase/tests/0013_*.sql --local

      - name: Run legacy pgTAP contract 0014
        run: supabase test db supabase/tests/0014_*.sql --local

      - name: Run legacy pgTAP contract 0015
        run: supabase test db supabase/tests/0015_*.sql --local

      - name: Run legacy pgTAP contract 0016
        run: supabase test db supabase/tests/0016_*.sql --local

      - name: Run legacy pgTAP contract 0017
        run: supabase test db supabase/tests/0017_*.sql --local

      - name: Run legacy pgTAP contract 0018
        run: supabase test db supabase/tests/0018_*.sql --local

      - name: Run legacy pgTAP contract 0019
        run: supabase test db supabase/tests/0019_*.sql --local

      - name: Run legacy pgTAP contract 0020
        run: supabase test db supabase/tests/0020_*.sql --local

      - name: Stop Supabase
        if: always()
        run: supabase stop
