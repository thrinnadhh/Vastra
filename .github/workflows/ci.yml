name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: s10-format-webhook
  cancel-in-progress: true

jobs:
  format:
    name: Format S10 webhook ingestion
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/s10-payment-lifecycle
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm format
      - name: Restore normal CI and commit formatting
        shell: bash
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore: format S10-03 webhook ingestion"
          git push origin HEAD:agent/s10-payment-lifecycle
