name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Diagnose customer profile database test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Start and reset local database
        shell: bash
        run: |
          supabase start > /tmp/profile-db-start.log 2>&1
          supabase db reset --local > /tmp/profile-db-reset.log 2>&1

      - name: Run customer profile pgTAP diagnostic
        id: profile_test
        shell: bash
        run: |
          set +e
          supabase test db supabase/tests/0091_customer_profile_update.test.sql --local > /tmp/profile-db-test.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload customer profile pgTAP output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-profile-pgtap-output
          path: /tmp/profile-db-test.log
          if-no-files-found: error

      - name: Propagate pgTAP result
        if: always()
        shell: bash
        run: exit "${{ steps.profile_test.outputs.status }}"
