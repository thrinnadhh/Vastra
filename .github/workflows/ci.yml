name: CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: s8-02-format-${{ github.ref }}
  cancel-in-progress: false

jobs:
  format:
    name: Format S8-02 implementation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out Sprint 8 branch
        uses: actions/checkout@v7
        with:
          ref: agent/s8-02-captain-availability-location
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply canonical formatting
        run: pnpm format

      - name: Commit formatter changes
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          if git diff --quiet; then
            echo "No formatter changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style(captain): format S8-02 implementation"
          git push origin HEAD:agent/s8-02-captain-availability-location
