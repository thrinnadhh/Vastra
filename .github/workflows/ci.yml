name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify repository
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Validate environment templates
        run: pnpm env:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Run integration tests
        run: pnpm test:integration

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Start Supabase
        run: supabase start

      - name: Reset database and apply migrations
        run: supabase db reset --local

      - name: Verify migration history
        run: supabase migration list --local

      - name: Run legacy pgTAP contracts 0001-0020
        shell: bash
        run: |
          shopt -s nullglob
          files=()
          for number in $(seq -w 1 20); do
            files+=(supabase/tests/00${number}_*.sql)
          done
          supabase test db "${files[@]}" --local

      - name: Run legacy pgTAP contracts 0021-0040
        shell: bash
        run: |
          shopt -s nullglob
          files=()
          for number in $(seq -w 21 40); do
            files+=(supabase/tests/00${number}_*.sql)
          done
          supabase test db "${files[@]}" --local

      - name: Run legacy pgTAP contracts 0041-0064
        shell: bash
        run: |
          shopt -s nullglob
          files=()
          for number in $(seq -w 41 64); do
            files+=(supabase/tests/00${number}_*.sql)
          done
          supabase test db "${files[@]}" --local

      - name: Run Sprint 10 closure pgTAP contracts
        run: >-
          supabase test db
          supabase/tests/0065_sprint10_admin_return_decision.test.sql
          supabase/tests/0066_sprint10_refund_execution.test.sql
          supabase/tests/0067_sprint10_finance_closure.test.sql
          --local

      - name: Stop Supabase
        if: always()
        run: supabase stop
