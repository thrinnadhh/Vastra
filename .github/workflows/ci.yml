name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: s10-format-foundation
  cancel-in-progress: true

jobs:
  format:
    name: Format S10 foundation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out finance foundation
        uses: actions/checkout@v7
        with:
          ref: feat/s10-finance-foundation
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format foundation files
        run: pnpm format

      - name: Restore normal CI and commit formatting
        shell: bash
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore: format S10-01 finance foundation"
          git push origin HEAD:feat/s10-finance-foundation
