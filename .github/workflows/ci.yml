name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Start Supabase
        run: supabase start

      - name: Reset database and apply migrations
        run: supabase db reset --local

      - name: Run legacy pgTAP contract 0011
        run: supabase test db supabase/tests/0011_operations_foundations.test.sql --local

      - name: Run legacy pgTAP contract 0013
        run: supabase test db supabase/tests/0013_hardening.test.sql --local

      - name: Run legacy pgTAP contract 0014
        run: supabase test db supabase/tests/0014_product_image_management.test.sql --local

      - name: Run legacy pgTAP contract 0017
        run: supabase test db supabase/tests/0017_merchant_inventory_adjustments.test.sql --local

      - name: Run legacy pgTAP contract 0018
        run: supabase test db supabase/tests/0018_inventory_barcode_lookup.test.sql --local

      - name: Run legacy pgTAP contract 0019
        run: supabase test db supabase/tests/0019_merchant_offline_sales.test.sql --local

      - name: Run legacy pgTAP contract 0020
        run: supabase test db supabase/tests/0020_customer_inventory_reservations.test.sql --local

      - name: Stop Supabase
        if: always()
        run: supabase stop
