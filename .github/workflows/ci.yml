name: CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: s8-02-typecheck-capture-${{ github.ref }}
  cancel-in-progress: false

jobs:
  capture:
    name: Capture S8-02 typecheck diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out Sprint 8 branch
        uses: actions/checkout@v7
        with:
          ref: agent/s8-02-captain-availability-location
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture focused typecheck output
        shell: bash
        run: |
          set +e
          : > s8-02-typecheck.log
          pnpm --filter @vastra/backend typecheck >> s8-02-typecheck.log 2>&1
          backend_status=$?
          pnpm --filter @vastra/captain-app typecheck >> s8-02-typecheck.log 2>&1
          captain_status=$?
          printf '\nBACKEND_TYPECHECK_EXIT_CODE=%s\nCAPTAIN_TYPECHECK_EXIT_CODE=%s\n' \
            "$backend_status" "$captain_status" >> s8-02-typecheck.log
          exit 0

      - name: Commit diagnostic log
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f s8-02-typecheck.log
          git commit -m "chore(s8-02): capture typecheck diagnostics"
          git push origin HEAD:agent/s8-02-captain-availability-location
