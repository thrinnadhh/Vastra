name: S7 Lint Capture

on:
  push:
    branches:
      - feat/s7-01-05-merchant-alert-delivery-foundation

permissions:
  contents: write

concurrency:
  group: s7-lint-capture-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Format and capture lint output
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: feat/s7-01-05-merchant-alert-delivery-foundation

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format repository
        run: pnpm format

      - name: Capture lint result
        shell: bash
        run: |
          set +e
          pnpm lint > docs/implementation/s7-lint-output.txt 2>&1
          status=$?
          set -e
          printf '\nLINT_EXIT_CODE=%s\n' "$status" >> docs/implementation/s7-lint-output.txt

      - name: Commit formatting and lint output
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore: format and capture Sprint 7 lint output"
          git push origin HEAD:feat/s7-01-05-merchant-alert-delivery-foundation
