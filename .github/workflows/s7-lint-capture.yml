name: S7 Lint Capture

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - docs/implementation/s7-lint-output.txt

permissions:
  contents: write

concurrency:
  group: s7-lint-capture-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Capture lint output
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out Sprint 7 branch
        uses: actions/checkout@v7
        with:
          ref: feat/s7-06-10-merchant-alert-runtime

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture lint result
        shell: bash
        run: |
          set +e
          pnpm lint > docs/implementation/s7-lint-output.txt 2>&1
          status=$?
          set -e
          printf '\nLINT_EXIT_CODE=%s\n' "$status" >> docs/implementation/s7-lint-output.txt

      - name: Commit lint output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs/implementation/s7-lint-output.txt
          git commit -m "chore: capture Sprint 7 lint output"
          git push origin HEAD:feat/s7-06-10-merchant-alert-runtime
