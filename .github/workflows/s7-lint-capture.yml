name: S7 Mobile Lint Fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: s7-mobile-lint-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fix:
    name: Apply mobile lint fixes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out Sprint 7 branch
        uses: actions/checkout@v7
        with:
          ref: feat/s7-06-10-merchant-alert-runtime

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply source fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'{label} marker not found')
              return text.replace(old, new, 1)

          diagnostics_path = Path('apps/merchant-app/src/alerts/merchant-alert-diagnostics.screen.tsx')
          diagnostics = diagnostics_path.read_text()
          diagnostics = replace_once(
              diagnostics,
              "import { useAudioPlayer } from 'expo-audio';\n",
              "import { useAudioPlayer } from 'expo-audio';\n\nimport ringtoneSource from '../../assets/sounds/vastra_new_order.wav';\n",
              'diagnostics audio import',
          )
          diagnostics = replace_once(
              diagnostics,
              "\nconst RINGTONE = require('../../assets/sounds/vastra_new_order.wav') as number;\n",
              "\n",
              'diagnostics require asset',
          )
          diagnostics = replace_once(
              diagnostics,
              'const player = useAudioPlayer(RINGTONE, { downloadFirst: true });',
              'const player = useAudioPlayer(ringtoneSource, { downloadFirst: true });',
              'diagnostics player source',
          )
          diagnostics = replace_once(
              diagnostics,
              '      player.loop = false;\n',
              '',
              'diagnostics loop mutation',
          )
          diagnostics_path.write_text(diagnostics)

          modal_path = Path('apps/merchant-app/src/alerts/merchant-urgent-alert.modal.tsx')
          modal = modal_path.read_text()
          modal = replace_once(
              modal,
              "import { useAudioPlayer } from 'expo-audio';\n",
              "import { useAudioPlayer } from 'expo-audio';\n\nimport ringtoneSource from '../../assets/sounds/vastra_new_order.wav';\n",
              'modal audio import',
          )
          modal = replace_once(
              modal,
              "\nconst RINGTONE = require('../../assets/sounds/vastra_new_order.wav') as number;\n",
              "\n",
              'modal require asset',
          )
          modal = replace_once(
              modal,
              "  return `${minutes}:${remaining.toString().padStart(2, '0')}`;",
              "  return `${String(minutes)}:${String(remaining).padStart(2, '0')}`;",
              'countdown formatting',
          )
          modal = replace_once(
              modal,
              "  const [remaining, setRemaining] = useState(() =>\n    alert === null ? 0 : merchantAlertSecondsRemaining(alert.expiresAt),\n  );",
              "  const [now, setNow] = useState(Date.now());\n  const remaining =\n    alert === null ? 0 : merchantAlertSecondsRemaining(alert.expiresAt, now);",
              'countdown state',
          )
          modal = replace_once(
              modal,
              'const player = useAudioPlayer(RINGTONE, { downloadFirst: true });',
              'const player = useAudioPlayer(ringtoneSource, { downloadFirst: true });',
              'modal player source',
          )
          old_effects = '''  useEffect(() => {
            player.loop = true;
            if (alert !== null && merchantAlertSecondsRemaining(alert.expiresAt) > 0) {
              player.play();
            } else {
              player.pause();
              void player.seekTo(0);
            }
            return () => {
              player.pause();
              void player.seekTo(0);
            };
          }, [alert, player]);

          ￼  useEffect(() => {
            if (alert === null) {
              setRemaining(0);
              return;
            }
            const update = () => {
              const next = merchantAlertSecondsRemaining(alert.expiresAt);
              setRemaining(next);
              if (next === 0) void runtime.clearActiveAlert();
            };
            update();
            const timer = setInterval(update, 1_000);
            return () => clearInterval(timer);
          }, [alert, runtime]);
'''.replace('￼', '')
          new_effects = '''  useEffect(() => {
            if (alert === null || merchantAlertSecondsRemaining(alert.expiresAt) === 0) {
              player.pause();
              void player.seekTo(0);
              return;
            }

          ￼    const replay = () => {
              void player.seekTo(0).then(() => {
                player.play();
              });
            };
            replay();
            const timer = setInterval(replay, 1_100);
            return () => {
              clearInterval(timer);
              player.pause();
              void player.seekTo(0);
            };
          }, [alert, player]);

          ￼  useEffect(() => {
            if (alert === null) return;
            const timer = setInterval(() => {
              setNow(Date.now());
            }, 1_000);
            return () => {
              clearInterval(timer);
            };
          }, [alert]);

          ￼  useEffect(() => {
            if (alert !== null && remaining === 0) {
              void runtime.clearActiveAlert();
            }
          }, [alert, remaining, runtime]);
'''.replace('￼', '')
          modal = replace_once(modal, old_effects, new_effects, 'modal audio and countdown effects')
          modal_path.write_text(modal)

          runtime_path = Path('apps/merchant-app/src/alerts/merchant-alert-notification.runtime.tsx')
          runtime = runtime_path.read_text()
          runtime = replace_once(
              runtime,
              '''    void Notifications.getLastNotificationResponseAsync()
                .then((response) => {
                  if (response !== null && mounted.current) {
                    setActiveAlert(activePayloadOrNull(readNotificationPayload(response.notification)));
                  }
                })
                .catch(() => undefined);
''',
              '''    try {
                const response = Notifications.getLastNotificationResponse();
                if (response !== null && mounted.current) {
                  setActiveAlert(activePayloadOrNull(readNotificationPayload(response.notification)));
                }
              } catch {
                // A missing cached response must not block the authenticated merchant runtime.
              }
''',
              'last notification response API',
          )
          runtime_path.write_text(runtime)

          queue_path = Path('apps/merchant-app/src/orders/merchant-order.screen.tsx')
          queue = queue_path.read_text()
          queue = replace_once(
              queue,
              '''  useEffect(() => {
                if (requestedOrderId === null) return;
                setSelectedOrderId(requestedOrderId);
                onRequestedOrderHandled?.();
              }, [onRequestedOrderHandled, requestedOrderId]);

          ￼'''.replace('￼', ''),
              '  const activeOrderId = requestedOrderId ?? selectedOrderId;\n\n',
              'requested order state effect',
          )
          queue = replace_once(
              queue,
              '    if (selectedOrderId !== null) return;',
              '    if (activeOrderId !== null) return;',
              'queue polling state',
          )
          queue = replace_once(
              queue,
              '  }, [load, pollIntervalMs, selectedOrderId]);',
              '  }, [activeOrderId, load, pollIntervalMs]);',
              'queue polling dependencies',
          )
          queue = replace_once(
              queue,
              '  if (selectedOrderId !== null) {',
              '  if (activeOrderId !== null) {',
              'active order detail condition',
          )
          queue = replace_once(
              queue,
              '''        onBack={() => {
                  setSelectedOrderId(null);
                }}
                orderClient={orderClient}
                orderId={selectedOrderId}''',
              '''        onBack={() => {
                  setSelectedOrderId(null);
                  if (requestedOrderId !== null) onRequestedOrderHandled?.();
                }}
                orderClient={orderClient}
                orderId={activeOrderId}''',
              'active order detail navigation',
          )
          queue_path.write_text(queue)

          Path('apps/merchant-app/src/assets.d.ts').write_text(
              "declare module '*.wav' {\n  const source: number;\n  export default source;\n}\n"
          )
          PY

      - name: Format repository
        run: pnpm format

      - name: Commit lint fixes
        shell: bash
        run: |
          rm -f .github/workflows/s7-lint-capture.yml
          rm -f docs/implementation/s7-lint-output.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix(merchant): satisfy urgent alert lint contracts"
          git push origin HEAD:feat/s7-06-10-merchant-alert-runtime
