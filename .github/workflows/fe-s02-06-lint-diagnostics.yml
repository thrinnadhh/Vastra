name: FE-S02-06 lint diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint-report:
    if: github.head_ref == 'feat/ui-fe-s02-06-frontend-test-harness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Capture exact repository lint output
        shell: bash
        run: |
          set +e
          pnpm lint > fe-s02-06-lint.log 2>&1
          status=$?
          cat fe-s02-06-lint.log
          echo "$status" > fe-s02-06-lint.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: fe-s02-06-lint-residual
          path: |
            fe-s02-06-lint.log
            fe-s02-06-lint.status
