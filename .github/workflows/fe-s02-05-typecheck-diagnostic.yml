name: FE-S02-05 typecheck diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  typecheck-report:
    if: github.head_ref == 'feat/ui-fe-s02-05-application-shells'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Capture exact repository typecheck output
        shell: bash
        run: |
          set +e
          pnpm typecheck > fe-s02-05-typecheck.log 2>&1
          status=$?
          cat fe-s02-05-typecheck.log
          echo "$status" > fe-s02-05-typecheck.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: fe-s02-05-typecheck-report
          path: |
            fe-s02-05-typecheck.log
            fe-s02-05-typecheck.status
