name: FE-S04-05 product type patch

on:
  pull_request:
    branches:
      - feat/ui-fe-s04-04-product-detail

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feat/ui-fe-s04-05-favourites-states'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/ui-fe-s04-05-favourites-states
      - name: Resolve inherited typed variant fixtures
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/customer-app/src/discovery/customer-product.screen.test.tsx')
          text = path.read_text()
          old = "variants: [{ ...product.variants[0], availableQuantity: 1 }, product.variants[1]],"
          new = "variants: [{ ...product.variants[0]!, availableQuantity: 1 }, product.variants[1]!],"
          if old not in text:
              raise SystemExit('variant fixture marker not found')
          path.write_text(text.replace(old, new, 1))
          PY
          rm .github/workflows/fe-s04-05-product-type-patch.yml
      - name: Commit inherited type patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/customer-app/src/discovery/customer-product.screen.test.tsx .github/workflows/fe-s04-05-product-type-patch.yml
          git diff --cached --quiet || git commit -m "test(customer): inherit typed product fixtures"
          git push origin HEAD:feat/ui-fe-s04-05-favourites-states
