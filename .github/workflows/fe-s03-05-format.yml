name: FE-S03-05 format

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feat/ui-fe-s03-05-profile-preferences'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: >-
          pnpm exec prettier --write
          apps/customer-app/src/profile/api-customer-preferences.adapter.test.ts
          apps/customer-app/src/profile/api-customer-preferences.adapter.ts
          apps/customer-app/src/profile/customer-profile-preferences.screen.test.tsx
          apps/customer-app/src/profile/customer-profile-preferences.screen.tsx
          apps/customer-app/src/profile/customer-profile-preferences.types.test.ts
          apps/customer-app/src/profile/customer-profile-preferences.types.ts
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/customer-app/src/profile
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "style(customer): format FE-S03-05 profile preferences"
          git push
