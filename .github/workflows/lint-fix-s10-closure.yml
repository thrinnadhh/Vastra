name: Lint-fix Sprint 10 closure

on:
  push:
    branches:
      - agent/s10-08-12-finance-closure
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/s10-08-12-finance-closure
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:fix || true
      - name: Commit lint fixes and remove helper
        run: |
          rm .github/workflows/lint-fix-s10-closure.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style(finance): apply Sprint 10 lint fixes"
          git push origin HEAD:agent/s10-08-12-finance-closure
