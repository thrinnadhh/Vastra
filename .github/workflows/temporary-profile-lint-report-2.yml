name: Temporary customer profile lint report 2

on:
  push:
    branches:
      - feat/be-fe-001-customer-profile-update

permissions:
  contents: write

jobs:
  report:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/be-fe-001-customer-profile-update
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vastra/api-client generate
      - run: pnpm lint > profile-lint-report-2.txt 2>&1 || true
      - run: rm .github/workflows/temporary-profile-lint-report-2.yml
      - name: Commit diagnostic report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-lint-report-2.txt .github/workflows/temporary-profile-lint-report-2.yml
          git commit -m "chore(profile): capture second lint diagnostics"
          git push origin HEAD:feat/be-fe-001-customer-profile-update
