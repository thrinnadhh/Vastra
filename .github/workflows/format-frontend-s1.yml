name: Format frontend Sprint 1

on:
  push:
    branches:
      - agent/frontend-sprint-1-design-system

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/frontend-sprint-1-design-system
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply canonical formatting
        run: pnpm format

      - name: Remove one-shot workflow
        run: rm .github/workflows/format-frontend-s1.yml

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(design): format Sprint 1 foundation"
          git push origin HEAD:agent/frontend-sprint-1-design-system
