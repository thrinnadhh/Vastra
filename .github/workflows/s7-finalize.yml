name: S7 Finalize

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: s7-finalize-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  finalize:
    name: Finalize Sprint 7 branch
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out Sprint 7 branch
        uses: actions/checkout@v7
        with:
          ref: feat/s7-06-10-merchant-alert-runtime

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Integrate merchant order queue
        run: python3 .github/scripts/s7_patch_queue.py

      - name: Integrate OpenAPI
        run: python3 .github/scripts/s7_patch_openapi.py

      - name: Generate bundled ringtone
        run: python3 .github/scripts/s7_generate_ringtone.py

      - name: Install dependencies and update lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Format repository
        run: pnpm format

      - name: Commit finalized implementation
        shell: bash
        run: |
          rm -f .github/workflows/s7-workspace-export.yml
          rm -f .github/workflows/s7-finalize.yml
          rm -rf .github/scripts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "feat: finalize Sprint 7 merchant alert runtime"
          git push origin HEAD:feat/s7-06-10-merchant-alert-runtime
