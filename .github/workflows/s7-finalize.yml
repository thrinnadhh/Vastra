name: S7 Finalize

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: s7-finalize-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  finalize:
    name: Finalize Sprint 7 branch
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out Sprint 7 branch
        uses: actions/checkout@v7
        with:
          ref: feat/s7-06-10-merchant-alert-runtime

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Patch queue, OpenAPI, and ringtone
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import math
          import struct
          import textwrap
          import wave

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f"Expected {label} marker was not found")
              return text.replace(old, new, 1)

          queue_path = Path('apps/merchant-app/src/orders/merchant-order.screen.tsx')
          queue = queue_path.read_text()
          if 'requestedOrderId = null' not in queue:
              queue = replace_once(
                  queue,
                  "  pollIntervalMs = 15_000,\n}: {",
                  "  pollIntervalMs = 15_000,\n  requestedOrderId = null,\n  onRequestedOrderHandled,\n  onOpenAlertDiagnostics,\n}: {",
                  'queue argument',
              )
              queue = replace_once(
                  queue,
                  "  readonly pollIntervalMs?: number;\n}) {",
                  "  readonly pollIntervalMs?: number;\n  readonly requestedOrderId?: string | null;\n  readonly onRequestedOrderHandled?: () => void;\n  readonly onOpenAlertDiagnostics?: () => void;\n}) {",
                  'queue prop type',
              )
              queue = replace_once(
                  queue,
                  "  }, []);\n\n  useEffect(() => {\n    if (selectedOrderId !== null) return;",
                  "  }, []);\n\n  useEffect(() => {\n    if (requestedOrderId === null) return;\n    setSelectedOrderId(requestedOrderId);\n    onRequestedOrderHandled?.();\n  }, [onRequestedOrderHandled, requestedOrderId]);\n\n  useEffect(() => {\n    if (selectedOrderId !== null) return;",
                  'requested order effect',
              )
              old_header = textwrap.dedent('''\
                      <Pressable
                        accessibilityLabel="Refresh merchant order queue"
                        accessibilityRole="button"
                        disabled={state.isLoading}
                        onPress={() => {
                          void load();
                        }}
                        style={styles.refreshAction}
                      >
                        <Text style={styles.refreshText}>{state.isLoading ? 'Refreshing…' : 'Refresh'}</Text>
                      </Pressable>''')
              new_header = textwrap.dedent('''\
                      <View style={styles.headerActions}>
                        {onOpenAlertDiagnostics === undefined ? null : (
                          <Pressable
                            accessibilityLabel="Open merchant alert diagnostics"
                            accessibilityRole="button"
                            onPress={onOpenAlertDiagnostics}
                            style={styles.setupAction}
                          >
                            <Text style={styles.setupText}>Alert setup</Text>
                          </Pressable>
                        )}
                        <Pressable
                          accessibilityLabel="Refresh merchant order queue"
                          accessibilityRole="button"
                          disabled={state.isLoading}
                          onPress={() => {
                            void load();
                          }}
                          style={styles.refreshAction}
                        >
                          <Text style={styles.refreshText}>{state.isLoading ? 'Refreshing…' : 'Refresh'}</Text>
                        </Pressable>
                      </View>''')
              queue = replace_once(queue, old_header, new_header, 'queue header')
              queue = replace_once(
                  queue,
                  "  link: { marginBottom: 16, color: '#8E3B46', fontSize: 16, fontWeight: '800' },\n  refreshAction: {",
                  "  link: { marginBottom: 16, color: '#8E3B46', fontSize: 16, fontWeight: '800' },\n  headerActions: { alignItems: 'flex-end', gap: 8 },\n  setupAction: {\n    paddingHorizontal: 12,\n    paddingVertical: 8,\n    borderWidth: 1,\n    borderColor: '#8E3B46',\n    borderRadius: 12,\n  },\n  setupText: { color: '#8E3B46', fontSize: 12, fontWeight: '800' },\n  refreshAction: {",
                  'queue styles',
              )
              queue_path.write_text(queue)

          openapi_path = Path('docs/api/openapi.yaml')
          openapi = openapi_path.read_text()
          if '    MerchantAlertDeliveryMetrics:' not in openapi:
              schema_source = textwrap.dedent('''\
              MerchantAlertDeliveryMetrics:
                type: object
                required: [windowMinutes, generatedAt, alertsCreated, alertsSent, alertsAcknowledged, alertsExpired, alertsFailed, averageAcknowledgementSeconds, activeAlerts, remindersQueued, deliveryAttempts, successfulAttempts, failedAttempts, retryableFailures, unregisteredTokens, outboxBacklog]
                properties:
                  windowMinutes: {type: integer, minimum: 5, maximum: 10080}
                  generatedAt: {type: string, format: date-time}
                  alertsCreated: {type: integer, minimum: 0}
                  alertsSent: {type: integer, minimum: 0}
                  alertsAcknowledged: {type: integer, minimum: 0}
                  alertsExpired: {type: integer, minimum: 0}
                  alertsFailed: {type: integer, minimum: 0}
                  averageAcknowledgementSeconds: {type: integer, minimum: 0}
                  activeAlerts: {type: integer, minimum: 0}
                  remindersQueued: {type: integer, minimum: 0}
                  deliveryAttempts: {type: integer, minimum: 0}
                  successfulAttempts: {type: integer, minimum: 0}
                  failedAttempts: {type: integer, minimum: 0}
                  retryableFailures: {type: integer, minimum: 0}
                  unregisteredTokens: {type: integer, minimum: 0}
                  outboxBacklog: {type: integer, minimum: 0}
              MerchantAlertDeliveryActivity:
                type: object
                required: [alertId, orderId, orderNumber, shopId, shopName, alertStatus, attemptCount, reminderCount, createdAt, expiresAt, acknowledgedAt, expiredAt, failureReason, successfulDeviceAttempts, failedDeviceAttempts, retryableDeviceFailures, lastAttemptAt, lastFailureCode]
                properties:
                  alertId: {type: string, format: uuid}
                  orderId: {type: string, format: uuid}
                  orderNumber: {type: string}
                  shopId: {type: string, format: uuid}
                  shopName: {type: string}
                  alertStatus: {type: string, enum: [PENDING, SENT, DELIVERED, ACKNOWLEDGED, EXPIRED, FAILED]}
                  attemptCount: {type: integer, minimum: 0}
                  reminderCount: {type: integer, minimum: 0}
                  createdAt: {type: string, format: date-time}
                  expiresAt: {type: string, format: date-time}
                  acknowledgedAt: {type: [string, 'null'], format: date-time}
                  expiredAt: {type: [string, 'null'], format: date-time}
                  failureReason: {type: [string, 'null']}
                  successfulDeviceAttempts: {type: integer, minimum: 0}
                  failedDeviceAttempts: {type: integer, minimum: 0}
                  retryableDeviceFailures: {type: integer, minimum: 0}
                  lastAttemptAt: {type: [string, 'null'], format: date-time}
                  lastFailureCode: {type: [string, 'null']}
              MerchantAlertMetricsResponse:
                type: object
                required: [success, data, meta]
                properties:
                  success: {type: boolean, const: true}
                  data:
                    type: object
                    required: [metrics]
                    properties:
                      metrics: {$ref: '#/components/schemas/MerchantAlertDeliveryMetrics'}
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: {type: ['null']}
              MerchantAlertActivityResponse:
                type: object
                required: [success, data, meta]
                properties:
                  success: {type: boolean, const: true}
                  data:
                    type: object
                    required: [activity, nextCursor]
                    properties:
                      activity:
                        type: array
                        items: {$ref: '#/components/schemas/MerchantAlertDeliveryActivity'}
                      nextCursor: {type: [string, 'null'], format: date-time}
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: {type: ['null']}
              ''')
              marker = "security:\n- bearerAuth: []\n\npaths:"
              openapi = replace_once(
                  openapi,
                  marker,
                  textwrap.indent(schema_source, '    ') + marker,
                  'OpenAPI schema boundary',
              )

          if '  /admin/merchant-alerts/metrics:' not in openapi:
              path_source = textwrap.dedent('''\
              /admin/merchant-alerts/metrics:
                get:
                  operationId: getMerchantAlertDeliveryMetrics
                  summary: Read bounded merchant alert delivery metrics
                  description: Requires an ADMIN account with operations.manage permission and operational readiness.
                  tags: [Admin]
                  security: [{bearerAuth: []}]
                  parameters:
                  - name: windowMinutes
                    in: query
                    required: false
                    schema: {type: integer, minimum: 5, maximum: 10080, default: 60}
                  responses:
                    '200':
                      description: Merchant alert delivery metrics
                      content:
                        application/json:
                          schema: {$ref: '#/components/schemas/MerchantAlertMetricsResponse'}
                    '400': {$ref: '#/components/responses/BadRequest'}
                    '401': {$ref: '#/components/responses/Unauthorized'}
                    '403': {$ref: '#/components/responses/Forbidden'}
                    '503':
                      description: Merchant alert observability is temporarily unavailable
                      content:
                        application/json:
                          schema: {$ref: '#/components/schemas/ApiError'}
              /admin/merchant-alerts/activity:
                get:
                  operationId: listMerchantAlertDeliveryActivity
                  summary: List recent merchant alert delivery activity
                  description: Requires an ADMIN account with operations.manage permission and operational readiness.
                  tags: [Admin]
                  security: [{bearerAuth: []}]
                  parameters:
                  - name: limit
                    in: query
                    required: false
                    schema: {type: integer, minimum: 1, maximum: 100, default: 50}
                  - name: before
                    in: query
                    required: false
                    schema: {type: string, format: date-time}
                  responses:
                    '200':
                      description: Recent merchant alert delivery activity
                      content:
                        application/json:
                          schema: {$ref: '#/components/schemas/MerchantAlertActivityResponse'}
                    '400': {$ref: '#/components/responses/BadRequest'}
                    '401': {$ref: '#/components/responses/Unauthorized'}
                    '403': {$ref: '#/components/responses/Forbidden'}
                    '503':
                      description: Merchant alert observability is temporarily unavailable
                      content:
                        application/json:
                          schema: {$ref: '#/components/schemas/ApiError'}
              ''')
              openapi = openapi.rstrip() + '\n' + textwrap.indent(path_source, '  ')
          openapi_path.write_text(openapi)

          sound_path = Path('apps/merchant-app/assets/sounds/vastra_new_order.wav')
          sound_path.parent.mkdir(parents=True, exist_ok=True)
          sample_rate = 22050
          duration = 1.2
          frames = []
          for index in range(int(sample_rate * duration)):
              time = index / sample_rate
              envelope = min(1.0, time / 0.04) * min(1.0, (duration - time) / 0.15)
              pulse = 1.0 if (index // int(sample_rate * 0.18)) % 2 == 0 else 0.55
              value = 0.38 * envelope * pulse * (
                  math.sin(2 * math.pi * 740 * time) + 0.55 * math.sin(2 * math.pi * 988 * time)
              )
              frames.append(struct.pack('<h', max(-32767, min(32767, int(value * 32767)))))
          with wave.open(str(sound_path), 'wb') as output:
              output.setnchannels(1)
              output.setsampwidth(2)
              output.setframerate(sample_rate)
              output.writeframes(b''.join(frames))
          PY

      - name: Install dependencies and update lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Format repository
        run: pnpm format

      - name: Commit finalized implementation
        shell: bash
        run: |
          rm -f .github/workflows/s7-workspace-export.yml
          rm -f .github/workflows/s7-finalize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "feat: finalize Sprint 7 merchant alert runtime"
          git push origin HEAD:feat/s7-06-10-merchant-alert-runtime
