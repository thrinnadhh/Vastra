name: FE-S03-06 API format

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feat/ui-fe-s03-06-root-migration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: >-
          pnpm exec prettier --write
          packages/api-client/src/index.ts
          packages/api-client/src/client.ts
          packages/api-client/src/errors.ts
          packages/api-client/src/logging.ts
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/api-client/src
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "style(api-client): format Metro compatibility"
          git push
