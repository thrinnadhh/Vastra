name: FE-S03-06 API fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feat/ui-fe-s03-06-root-migration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply typed query serialization fix
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'packages/api-client/src/client.ts';
          let source = fs.readFileSync(path, 'utf8');
          source = source.replace(
            "const buildQuery = (queryInput: unknown): string => {",
            `const encodeQueryValue = (value: unknown): string => {\n  if (typeof value === 'string' || typeof value === 'number' || typeof value === 'boolean') {\n    return String(value);\n  }\n\n  throw new ApiClientError(createLocalError('CONTRACT', 'unknown'));\n};\n\nconst buildQuery = (queryInput: unknown): string => {`,
          );
          source = source.replaceAll('String(item)', 'encodeQueryValue(item)');
          source = source.replace('String(value)', 'encodeQueryValue(value)');
          source = source.replace(
            'execute(controller?.signal as AbortSignalLike | undefined)',
            'execute(controller?.signal)',
          );
          fs.writeFileSync(path, source);
          NODE
      - run: pnpm exec prettier --write packages/api-client/src/client.ts
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/api-client/src/client.ts
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "fix(api-client): validate query serialization"
          git push
