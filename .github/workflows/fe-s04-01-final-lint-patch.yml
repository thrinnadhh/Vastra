name: FE-S04-01 final lint patch

on:
  pull_request:
    branches:
      - feat/ui-fe-s03-06-root-migration

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feat/ui-fe-s04-01-home-composition'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply exact merge-lint fixes
        run: |
          python <<'PY'
          from pathlib import Path

          adapter_path = Path('apps/customer-app/src/discovery/api-customer-home.adapter.ts')
          adapter = adapter_path.read_text()
          adapter = adapter.replace(
              """import type {\n  CustomerHomeCoordinates,\n  CustomerHomeLoadResult,\n  CustomerHomePort,\n} from './customer-home.types';\n""",
              """import type {\n  CustomerHomeCoordinates,\n  CustomerHomeLoadResult,\n  CustomerHomePort,\n} from './customer-home.types';\n\ninterface CustomerHomeApiCategory {\n  readonly id: string;\n  readonly name: string;\n  readonly description: string | null;\n}\n\ninterface CustomerHomeApiShop {\n  readonly id: string;\n  readonly name: string;\n  readonly operationalStatus: string;\n  readonly acceptsOnlineOrders: boolean;\n  readonly distanceMeters: number;\n  readonly minimumOrderPaise: number;\n  readonly averagePreparationMinutes: number;\n}\n\ninterface CustomerHomeApiProduct {\n  readonly id: string;\n  readonly name: string;\n  readonly brand: string | null;\n  readonly genderCategory: string;\n  readonly primaryImage: Readonly<{\n    readonly imageUrl: string;\n    readonly altText: string;\n  }> | null;\n  readonly minSellingPricePaise: number | null;\n  readonly maxSellingPricePaise: number | null;\n  readonly availableVariantCount: number;\n  readonly totalAvailableQuantity: number;\n  readonly isAvailable: boolean;\n}\n\ninterface CustomerHomeApiResponse {\n  readonly data: Readonly<{\n    readonly data: Readonly<{\n      readonly location: CustomerHomeCoordinates;\n      readonly categories: readonly CustomerHomeApiCategory[];\n      readonly nearbyShops: readonly CustomerHomeApiShop[];\n      readonly nearbyProducts: readonly Readonly<{\n        readonly product: CustomerHomeApiProduct;\n        readonly shop: Readonly<{ readonly id: string; readonly name: string }>;\n      }>[];\n    }>;\n  }>;\n}\n""",
              1,
          )
          adapter = adapter.replace(
              """      const response = await this.apiClient.request('getCustomerHome', {\n        query: {\n          latitude: coordinates.latitude,\n          longitude: coordinates.longitude,\n          shopLimit: 8,\n          productLimit: 16,\n        },\n      });\n      const data = response.data.data;\n""",
              """      const responseValue: unknown = await this.apiClient.request('getCustomerHome', {\n        query: {\n          latitude: coordinates.latitude,\n          longitude: coordinates.longitude,\n          shopLimit: 8,\n          productLimit: 16,\n        },\n      });\n      const response = responseValue as CustomerHomeApiResponse;\n      const data = response.data.data;\n""",
              1,
          )
          adapter_path.write_text(adapter)

          screen_path = Path('apps/customer-app/src/discovery/customer-home.screen.tsx')
          screen = screen_path.read_text()
          screen = screen.replace(
              """  CustomerHomeFailureKind,\n  CustomerHomePort,\n""",
              """  CustomerHomeFailureKind,\n  CustomerHomeLoadResult,\n  CustomerHomePort,\n""",
              1,
          )
          old = """  const loadHome = useCallback(async () => {\n    const result = await props.homePort.loadHome(props.coordinates);\n\n    if (result.kind === 'SUCCESS') {\n      setContent(result.content);\n      setFailureKind(null);\n    } else {\n      setFailureKind(result.failureKind);\n    }\n    setIsLoading(false);\n  }, [props.coordinates, props.homePort]);\n\n  useEffect(() => {\n    void loadHome();\n  }, [loadHome]);\n\n  const retryHome = (): void => {\n    setIsLoading(true);\n    void loadHome();\n  };\n"""
          new = """  const applyLoadResult = useCallback((result: CustomerHomeLoadResult): void => {\n    if (result.kind === 'SUCCESS') {\n      setContent(result.content);\n      setFailureKind(null);\n    } else {\n      setFailureKind(result.failureKind);\n    }\n    setIsLoading(false);\n  }, []);\n\n  useEffect(() => {\n    let active = true;\n\n    void props.homePort.loadHome(props.coordinates).then((result) => {\n      if (active) {\n        applyLoadResult(result);\n      }\n    });\n\n    return () => {\n      active = false;\n    };\n  }, [applyLoadResult, props.coordinates, props.homePort]);\n\n  const retryHome = (): void => {\n    setIsLoading(true);\n    void props.homePort.loadHome(props.coordinates).then(applyLoadResult);\n  };\n"""
          if old not in screen:
              raise SystemExit('missing Home loading block')
          screen_path.write_text(screen.replace(old, new, 1))

          Path('.github/workflows/fe-s04-01-merge-lint-diagnostic.yml').unlink(missing_ok=True)
          Path('.github/workflows/fe-s04-01-final-lint-patch.yml').unlink()
          PY
          pnpm exec prettier --write \
            apps/customer-app/src/discovery/api-customer-home.adapter.ts \
            apps/customer-app/src/discovery/customer-home.screen.tsx
      - name: Commit final lint fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(customer): resolve FE-S04-01 merge lint"
          git push
