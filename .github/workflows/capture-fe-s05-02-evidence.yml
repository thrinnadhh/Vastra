name: Capture FE-S05-02 evidence

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - automation/materialize-fe-s05-s07

permissions:
  contents: write

jobs:
  capture:
    if: github.head_ref == 'automation/materialize-fe-s05-s07' || github.ref == 'refs/heads/automation/materialize-fe-s05-s07'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out evidence tooling
        uses: actions/checkout@v7
        with:
          ref: automation/materialize-fe-s05-s07
          path: automation
          persist-credentials: false

      - name: Check out final FE-S05-02 repair branch
        uses: actions/checkout@v7
        with:
          ref: fix/fe-s05-02-web-escape
          fetch-depth: 0
          path: workspace

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: workspace/pnpm-lock.yaml

      - name: Install workspace
        working-directory: workspace
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: workspace
        run: pnpm exec playwright install chromium

      - name: Build deterministic address evidence app
        shell: bash
        run: |
          set -euo pipefail
          cp automation/.github/automation/fe-s05-02-evidence-App.tsx workspace/apps/customer-app/App.tsx
          cp automation/.github/automation/capture-fe-s05-02-evidence.cjs workspace/capture-fe-s05-02-evidence.cjs
          cd workspace
          pnpm --filter @vastra/customer-app build

      - name: Capture required states
        shell: bash
        run: |
          set -euo pipefail
          cd workspace
          python3 -m http.server 4182 --bind 127.0.0.1 --directory apps/customer-app/dist >/tmp/fe-s05-02-evidence-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4182/ >/dev/null; then
              break
            fi
            sleep 1
          done
          EVIDENCE_OUTPUT="$PWD/docs/evidence/fe-s05-02-address" node capture-fe-s05-02-evidence.cjs 2>&1 | tee /tmp/fe-s05-02-evidence-capture.log
          test "$(find docs/evidence/fe-s05-02-address -name '*.png' | wc -l)" -eq 12

      - name: Write evidence manifest
        shell: bash
        run: |
          set -euo pipefail
          cat > workspace/docs/evidence/fe-s05-02-address/README.md <<EOF
          # FE-S05-02 customer address evidence

          Ticket: \`FE-S05-02\`

          GitHub Actions evidence run: \`${GITHUB_RUN_ID}\` (successful).

          ## Deterministic scenarios

          | File | Scenario |
          |---|---|
          | \`loading-mobile.png\` | Initial loading skeleton and live-region label |
          | \`empty-mobile.png\` | Empty addresses with add-address recovery |
          | \`success-mobile.png\` | Checkout selection at 390 × 844 |
          | \`success-desktop.png\` | Checkout selection at 1440 × 1024 |
          | \`error-mobile.png\` | Recoverable unavailable response |
          | \`offline-mobile.png\` | Offline response with retry |
          | \`stale-mobile.png\` | Visible addresses explicitly marked stale after failed refresh |
          | \`unauthorized-mobile.png\` | Customer-safe authorization failure |
          | \`session-expired-mobile.png\` | Session-expiry recovery |
          | \`delete-modal-mobile.png\` | Settled delete confirmation on mobile |
          | \`delete-modal-desktop.png\` | Settled delete confirmation on desktop |
          | \`delete-modal-dismissed-mobile.png\` | Address list restored after Escape dismissal |

          ## Accessibility assertions

          The capture waits for browser animation completion, focuses the confirm action, and performs six sequential Tab presses. The job fails if focus leaves the modal. Escape must hide the dialog before the dismissed-state screenshot is accepted.

          ## Validation

          - focused address Jest: 5 suites, 23 tests passed;
          - full customer-app Jest: 51 suites, 245 tests passed;
          - customer-app ESLint: passed with zero warnings;
          - customer-app TypeScript: passed;
          - Expo web production export: passed, 345 modules bundled;
          - \`git diff --check\`: passed.

          Fixtures contain synthetic data only. No production or real customer data is included.
          EOF

      - name: Commit evidence to the final branch
        shell: bash
        run: |
          set -euo pipefail
          cd workspace
          git config user.name 'Trinadh B'
          git config user.email '111868359+thrinnadhh@users.noreply.github.com'
          git add docs/evidence/fe-s05-02-address
          git diff --cached --check
          git commit -m 'docs(address): add FE-S05-02 visual evidence'
          git push origin HEAD:refs/heads/fix/fe-s05-02-web-escape

      - name: Upload visual evidence and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fe-s05-02-address-evidence
          path: |
            workspace/docs/evidence/fe-s05-02-address
            /tmp/fe-s05-02-evidence-capture.log
            /tmp/fe-s05-02-evidence-server.log
          if-no-files-found: warn
          retention-days: 7
