name: FE-S04-04 format

on:
  pull_request:
    branches:
      - feat/ui-fe-s04-03-shop-experience

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feat/ui-fe-s04-04-product-detail'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/ui-fe-s04-04-product-detail
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format FE-S04-04 files
        run: |
          pnpm exec prettier --write \
            apps/customer-app/src/discovery/customer-product.types.ts \
            apps/customer-app/src/discovery/api-customer-product.adapter.ts \
            apps/customer-app/src/discovery/customer-product.screen.tsx \
            apps/customer-app/src/discovery/default-customer-search.tsx \
            apps/customer-app/src/discovery/api-customer-product.adapter.test.ts \
            apps/customer-app/src/discovery/customer-product.screen.test.tsx \
            docs/design/customer-product-detail.md
          rm .github/workflows/fe-s04-04-format.yml
      - name: Commit formatted files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/customer-app/src/discovery docs/design/customer-product-detail.md .github/workflows/fe-s04-04-format.yml
          git diff --cached --quiet || git commit -m "style(customer): format FE-S04-04"
          git push origin HEAD:feat/ui-fe-s04-04-product-detail
