name: S7 Database Capture

on:
  push:
    branches:
      - feat/s7-01-05-merchant-alert-delivery-foundation

permissions:
  contents: write

concurrency:
  group: s7-db-capture-${{ github.ref }}
  cancel-in-progress: true

jobs:
  database:
    name: Capture database phases
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: feat/s7-01-05-merchant-alert-delivery-foundation

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Capture database phases
        shell: bash
        run: |
          log=docs/implementation/s7-db-output.txt
          : > "$log"

          run_phase() {
            local name="$1"
            shift
            printf '\n===== %s =====\n' "$name" >> "$log"
            set +e
            timeout --kill-after=30s 300s "$@" >> "$log" 2>&1
            local status=$?
            set -e
            printf '\n%s_EXIT_CODE=%s\n' "$name" "$status" >> "$log"
            return "$status"
          }

          final_status=0
          if run_phase SUPABASE_START supabase start; then
            if ! run_phase DB_RESET supabase db reset --local; then
              final_status=$?
            elif ! run_phase MIGRATION_LIST supabase migration list --local; then
              final_status=$?
            elif ! run_phase PGTAP supabase test db --local; then
              final_status=$?
            elif ! run_phase CONCURRENCY bash scripts/run-db-concurrency-tests.sh; then
              final_status=$?
            elif ! run_phase ADVISORS supabase db advisors --local; then
              final_status=$?
            fi
            run_phase SUPABASE_STOP supabase stop || true
          else
            final_status=$?
          fi

          printf '\nDB_EXIT_CODE=%s\n' "$final_status" >> "$log"

      - name: Format repository
        run: pnpm format

      - name: Commit database output
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore: capture Sprint 7 database output"
          git push origin HEAD:feat/s7-01-05-merchant-alert-delivery-foundation
