name: S7 Database Capture

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - docs/implementation/s7-db-output.txt

permissions:
  contents: write

concurrency:
  group: s7-db-capture-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  database:
    name: Capture database phases
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Check out Sprint 7 branch
        uses: actions/checkout@v7
        with:
          ref: feat/s7-01-05-merchant-alert-delivery-foundation

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Capture database phases
        shell: bash
        run: |
          log=docs/implementation/s7-db-output.txt
          : > "$log"

          run_phase() {
            local name="$1"
            shift
            printf '\n===== %s =====\n' "$name" >> "$log"
            set +e
            timeout --kill-after=30s 300s "$@" >> "$log" 2>&1
            local status=$?
            set -e
            printf '\n%s_EXIT_CODE=%s\n' "$name" "$status" >> "$log"
            return "$status"
          }

          final_status=0
          if run_phase SUPABASE_START supabase start; then
            if run_phase DB_RESET supabase db reset --local; then
              if run_phase PGTAP supabase test db --local; then
                if run_phase CONCURRENCY bash scripts/run-db-concurrency-tests.sh; then
                  run_phase ADVISORS supabase db advisors --local || final_status=$?
                else
                  final_status=$?
                fi
              else
                final_status=$?
              fi
            else
              final_status=$?
            fi
            run_phase SUPABASE_STOP supabase stop || true
          else
            final_status=$?
          fi

          printf '\nDB_EXIT_CODE=%s\n' "$final_status" >> "$log"

      - name: Commit database output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs/implementation/s7-db-output.txt
          git commit -m "chore: capture Sprint 7 database output"
          git pull --rebase origin feat/s7-01-05-merchant-alert-delivery-foundation
          git push origin HEAD:feat/s7-01-05-merchant-alert-delivery-foundation
