name: S7 Database Fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: s7-db-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fix:
    name: Apply database fix
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out Sprint 7 branch
        uses: actions/checkout@v7
        with:
          ref: feat/s7-01-05-merchant-alert-delivery-foundation

      - name: Replace invalid composite assignment
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path(
              'supabase/migrations/'
              '20260717103000_merchant_alert_delivery_foundation.sql'
          )
          text = path.read_text()
          old = """  select alert, placed_order
            into alert_row, order_row
            from public.merchant_order_alerts alert
            join public.orders placed_order
              on placed_order.id = alert.order_id
             and placed_order.shop_id = alert.shop_id
            where alert.id = p_alert_id
            for update of alert, placed_order;

            if not found then
              raise exception 'merchant order alert not found' using errcode = 'P0014';
            end if;
          """
          new = """  select placed_order.*
            into order_row
            from public.orders placed_order
            join public.merchant_order_alerts alert
              on alert.order_id = placed_order.id
             and alert.shop_id = placed_order.shop_id
            where alert.id = p_alert_id
            for update of placed_order;

            if not found then
              raise exception 'merchant order alert not found' using errcode = 'P0014';
            end if;

            select alert.*
            into alert_row
            from public.merchant_order_alerts alert
            where alert.id = p_alert_id
              and alert.order_id = order_row.id
              and alert.shop_id = order_row.shop_id
            for update;

            if not found then
              raise exception 'merchant order alert not found' using errcode = 'P0014';
            end if;
          """
          if old not in text:
              raise SystemExit('Expected composite assignment block was not found')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Remove temporary diagnostics
        run: |
          rm -f docs/implementation/s7-db-output.txt
          rm -f .github/workflows/s7-db-capture.yml

      - name: Commit database fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix(alerts): lock delivery rows explicitly"
          git push origin HEAD:feat/s7-01-05-merchant-alert-delivery-foundation
