name: S7 Database Capture

on:
  push:
    branches:
      - feat/s7-01-05-merchant-alert-delivery-foundation

permissions:
  contents: write

concurrency:
  group: s7-db-capture-${{ github.ref }}
  cancel-in-progress: true

jobs:
  database:
    name: Capture database output
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: feat/s7-01-05-merchant-alert-delivery-foundation

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Capture database result
        shell: bash
        run: |
          set +e
          timeout 420s pnpm db:test > docs/implementation/s7-db-output.txt 2>&1
          status=$?
          set -e
          printf '\nDB_EXIT_CODE=%s\n' "$status" >> docs/implementation/s7-db-output.txt

      - name: Format repository
        run: pnpm format

      - name: Commit database output
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore: capture Sprint 7 database output"
          git push origin HEAD:feat/s7-01-05-merchant-alert-delivery-foundation
