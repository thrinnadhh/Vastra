name: FE-S04-03 format

on:
  pull_request:
    branches:
      - feat/ui-fe-s04-02-search-contract

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feat/ui-fe-s04-03-shop-experience'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format FE-S04-03 files
        run: |
          pnpm exec prettier --write \
            apps/customer-app/src/discovery/api-customer-shop.adapter.test.ts \
            apps/customer-app/src/discovery/api-customer-shop.adapter.ts \
            apps/customer-app/src/discovery/customer-shop.types.ts \
            apps/customer-app/src/discovery/customer-shops.screen.test.tsx \
            apps/customer-app/src/discovery/customer-shops.screen.tsx \
            apps/customer-app/src/discovery/default-customer-search.tsx \
            docs/design/customer-shop-experience.md
          rm .github/workflows/fe-s04-03-format.yml
      - name: Commit formatted files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "style(customer): format FE-S04-03"
          git push
