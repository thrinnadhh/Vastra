name: FE-S04-04 lint patch

on:
  pull_request:
    branches:
      - feat/ui-fe-s04-03-shop-experience

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feat/ui-fe-s04-04-product-detail'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/ui-fe-s04-04-product-detail
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Add exhaustive error case
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/customer-app/src/discovery/customer-product.screen.tsx')
          text = path.read_text()
          old = """    case 'CART_CONFLICT':\n      return 'Your cart contains items from another shop.';\n    default:\n      return 'Product details could not be loaded. Retry the authoritative request.';\n"""
          new = """    case 'CART_CONFLICT':\n      return 'Your cart contains items from another shop.';\n    case 'ERROR':\n      return 'Product details could not be loaded. Retry the authoritative request.';\n"""
          if old not in text:
              raise SystemExit('exhaustive switch marker not found')
          path.write_text(text.replace(old, new, 1))
          PY
          rm .github/workflows/fe-s04-04-lint-diagnostic.yml
          rm .github/workflows/fe-s04-04-lint-patch.yml
          pnpm exec prettier --write apps/customer-app/src/discovery/customer-product.screen.tsx
      - name: Commit lint patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/customer-app/src/discovery/customer-product.screen.tsx .github/workflows
          git diff --cached --quiet || git commit -m "fix(customer): handle product error exhaustively"
          git push origin HEAD:feat/ui-fe-s04-04-product-detail
