name: FE-S03-06 native client

on:
  pull_request:

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'feat/ui-fe-s03-06-root-migration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Materialize Metro-compatible native client
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const source = fs
            .readFileSync('packages/api-client/src/client.ts', 'utf8')
            .replaceAll("'./generated/openapi.js'", "'./generated/openapi'")
            .replaceAll("'./errors.js'", "'./errors'")
            .replaceAll("'./logging.js'", "'./logging'")
            .replaceAll("'./schema.js'", "'./schema'")
            .replaceAll("'./types.js'", "'./types'");
          fs.writeFileSync('packages/api-client/src/native-client.ts', source);
          NODE
      - run: pnpm exec prettier --write packages/api-client/src/native-client.ts
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/api-client/src/native-client.ts
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "feat(api-client): add Metro-compatible native client"
          git push
