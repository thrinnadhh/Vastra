name: FE-S04-01 unit diagnostic

on:
  pull_request:
    branches:
      - feat/ui-fe-s03-06-root-migration

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'feat/ui-fe-s04-01-home-composition'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture unit-test diagnostics
        run: |
          pnpm test > unit-report.txt 2>&1 || true
          if [ ! -s unit-report.txt ]; then
            echo "Unit tests produced no output." > unit-report.txt
          fi
          tail -n 500 unit-report.txt
      - uses: actions/upload-artifact@v6
        with:
          name: fe-s04-01-unit-report
          path: unit-report.txt
          if-no-files-found: error
