name: FE-S04-02 lint patch

on:
  pull_request:
    branches:
      - feat/ui-fe-s04-01-home-composition-main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feat/ui-fe-s04-02-search-contract'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Replace unsafe Jest matchers
        run: |
          python <<'PY'
          from pathlib import Path

          adapter_path = Path('apps/customer-app/src/discovery/api-customer-search.adapter.test.ts')
          adapter = adapter_path.read_text()
          old_adapter = """    expect(request).toHaveBeenCalledWith('searchCustomerProducts', {\n      query: expect.objectContaining({ cursor: 'opaque-cursor' }),\n    });\n"""
          new_adapter = """    expect(request).toHaveBeenCalledWith('searchCustomerProducts', {\n      query: {\n        q: 'dress',\n        latitude: 13.6288,\n        longitude: 79.4192,\n        availableOnly: true,\n        sort: 'RELEVANCE',\n        limit: 20,\n        cursor: 'opaque-cursor',\n      },\n    });\n"""
          if old_adapter not in adapter:
              raise SystemExit('missing adapter matcher')
          adapter_path.write_text(adapter.replace(old_adapter, new_adapter, 1))

          screen_path = Path('apps/customer-app/src/discovery/customer-search.screen.test.tsx')
          screen = screen_path.read_text()
          old_screen = """    expect(searchPort.requests).toHaveLength(2);\n    expect(searchPort.requests[1]).toEqual(\n      expect.objectContaining({\n        query: 'cotton shirt',\n        filters: expect.objectContaining({ gender: 'WOMEN' }),\n      }),\n    );\n"""
          new_screen = """    expect(searchPort.requests).toHaveLength(2);\n    expect(searchPort.requests[1]).toEqual({\n      query: 'cotton shirt',\n      location,\n      filters: { ...DEFAULT_CUSTOMER_SEARCH_FILTERS, gender: 'WOMEN' },\n      cursor: null,\n      limit: 20,\n    });\n"""
          if old_screen not in screen:
              raise SystemExit('missing screen matcher')
          screen_path.write_text(screen.replace(old_screen, new_screen, 1))

          Path('.github/workflows/fe-s04-02-lint-diagnostic.yml').unlink(missing_ok=True)
          Path('.github/workflows/fe-s04-02-lint-patch.yml').unlink()
          PY
          pnpm exec prettier --write \
            apps/customer-app/src/discovery/api-customer-search.adapter.test.ts \
            apps/customer-app/src/discovery/customer-search.screen.test.tsx
      - name: Commit lint patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "test(customer): remove unsafe FE-S04-02 matchers"
          git push
