openapi: 3.1.0
info:
  title: Vastra MVP API
  version: 1.0.0
  description: Canonical MVP API contract for Customer, Merchant, Captain, and Admin
    applications.
servers:
- url: http://localhost:8080/v1
  description: Local
- url: https://staging-api.vastra.in/v1
  description: Staging
- url: https://api.vastra.in/v1
  description: Production
tags:
- name: Common
- name: Customer
- name: Merchant
- name: Captain
- name: Admin
- name: Webhooks
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    webhookSignature:
      type: apiKey
      in: header
      name: X-Webhook-Signature
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        format: uuid
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
  schemas:
    ApiError:
      type: object
      required:
      - success
      - error
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type:
              - object
              - 'null'
              additionalProperties: true
            retryable:
              type: boolean
              default: false
        requestId:
          type:
          - string
          - 'null'
    Profile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        accountType:
          type: string
          enum:
          - CUSTOMER
          - MERCHANT
          - CAPTAIN
          - ADMIN
        fullName:
          type:
          - string
          - 'null'
        phoneNumber:
          type:
          - string
          - 'null'
        status:
          type: string
    ProductVariant:
      type: object
      required:
      - id
      - productId
      - sizeLabel
      - sellingPricePaise
      - availableQuantity
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        sku:
          type: string
        colourName:
          type:
          - string
          - 'null'
        sizeLabel:
          type: string
        mrpPaise:
          type: integer
          minimum: 0
        sellingPricePaise:
          type: integer
          minimum: 0
        availableQuantity:
          type: integer
          minimum: 0
    Order:
      type: object
      required:
      - id
      - orderNumber
      - status
      - totalPaise
      properties:
        id:
          type: string
          format: uuid
        orderNumber:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        paymentStatus:
          type: string
        totalPaise:
          type: integer
          minimum: 0
        placedAt:
          type: string
          format: date-time
    OrderStatus:
      type: string
      enum:
      - PAYMENT_PENDING
      - WAITING_FOR_MERCHANT
      - MERCHANT_ACCEPTED
      - PACKING
      - READY_FOR_PICKUP
      - CAPTAIN_SEARCHING
      - CAPTAIN_ASSIGNED
      - CAPTAIN_AT_STORE
      - PICKED_UP
      - OUT_FOR_DELIVERY
      - CAPTAIN_AT_CUSTOMER
      - DELIVERED
      - COMPLETED
      - PROBLEM_REPORTED
      - CANCELLED
    CreateOrderRequest:
      type: object
      required:
      - cartId
      - quoteId
      - addressId
      - paymentMethod
      properties:
        cartId:
          type: string
          format: uuid
        quoteId:
          type: string
          format: uuid
        addressId:
          type: string
          format: uuid
        paymentMethod:
          type: string
          enum:
          - COD
          - UPI
          - CARD
        customerNote:
          type:
          - string
          - 'null'
          maxLength: 500
    InventoryAdjustmentRequest:
      type: object
      required:
      - variantId
      - action
      - quantity
      properties:
        variantId:
          type: string
          format: uuid
        action:
          type: string
          enum:
          - ADD_STOCK
          - OFFLINE_SALE
          - RETURN_TO_STOCK
          - MARK_DAMAGED
          - STOCK_CORRECTION
          - STOCK_CHECK
        quantity:
          type: integer
          minimum: 1
        reason:
          type:
          - string
          - 'null'
          maxLength: 500
    MerchantAcceptRequest:
      type: object
      required:
      - preparationMinutes
      properties:
        preparationMinutes:
          type: integer
          minimum: 1
          maximum: 120
    MerchantRejectRequest:
      type: object
      required:
      - issueType
      properties:
        orderItemId:
          type:
          - string
          - 'null'
          format: uuid
        issueType:
          type: string
          enum:
          - OUT_OF_STOCK
          - SIZE_UNAVAILABLE
          - COLOUR_UNAVAILABLE
          - DAMAGED_ITEM
          - INVENTORY_MISMATCH
          - ITEM_NOT_FOUND
          - SHOP_BUSY
          - SHOP_CLOSING
          - OTHER
        note:
          type:
          - string
          - 'null'
          maxLength: 500
    DeliveryCompleteRequest:
      type: object
      required:
      - deliveryOtp
      properties:
        deliveryOtp:
          type: string
          pattern: ^[0-9]{4,8}$
        codCollectedPaise:
          type: integer
          minimum: 0
        proofMethod:
          type: string
          enum:
          - OTP
          - ADMIN_OVERRIDE
security:
- bearerAuth: []
paths:
  /me:
    get:
      summary: Get current account
      tags:
      - Common
      responses:
        '200':
          description: Success
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /me/devices:
