openapi: 3.1.0
info:
  title: Vastra MVP API
  version: 1.1.0
  description: Canonical MVP API contract for Customer, Merchant, Captain, and Admin
    applications.
servers:
- url: http://localhost:8080/v1
  description: Local
- url: https://staging-api.vastra.in/v1
  description: Staging
- url: https://api.vastra.in/v1
  description: Production
tags:
- name: Common
- name: Customer
- name: Merchant
- name: Captain
- name: Admin
- name: Webhooks
- name: Wardrobe
- name: Group Style
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    webhookSignature:
      type: apiKey
      in: header
      name: X-Webhook-Signature
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        format: uuid
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ApiError'}
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ApiError'}
    Forbidden:
      description: Actor is not authorized for the resource
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ApiError'}
    NotFound:
      description: Resource not found or not visible to the actor
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ApiError'}
    Conflict:
      description: Resource state conflicts with the request
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ApiError'}
    Gone:
      description: Invite is expired, revoked, or exhausted
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ApiError'}
    ServiceUnavailable:
      description: Service is temporarily unavailable
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ApiError'}
  schemas:
    ApiError:
      type: object
      required:
      - success
      - error
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type:
              - object
              - 'null'
              additionalProperties: true
            retryable:
              type: boolean
              default: false
        requestId:
          type:
          - string
          - 'null'
          format: uuid
    ActionResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    MerchantCatalogueShop:
      type: object
      required:
      - id
      - shopCode
      - name
      - slug
      - verificationStatus
      - operationalStatus
      - acceptsOnlineOrders
      - serviceRadiusMeters
      - minimumOrderPaise
      - averagePreparationMinutes
      - createdAt
      - updatedAt
      properties:
        id: {type: string, format: uuid}
        shopCode: {type: string}
        name: {type: string}
        slug: {type: string}
        verificationStatus:
          type: string
          enum: [PENDING, IN_REVIEW, VERIFIED, REJECTED]
        operationalStatus:
          type: string
          enum: [OPEN, BUSY, TEMPORARILY_CLOSED, CLOSED_FOR_DAY, PAUSED, SUSPENDED]
        acceptsOnlineOrders: {type: boolean}
        serviceRadiusMeters: {type: integer, minimum: 0}
        minimumOrderPaise: {type: integer, minimum: 0}
        averagePreparationMinutes: {type: integer, minimum: 0}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
    ListMerchantCatalogueShopsResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [shops]
          properties:
            shops:
              type: array
              items: {$ref: '#/components/schemas/MerchantCatalogueShop'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    GetMerchantCatalogueShopResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [shop]
          properties:
            shop: {$ref: '#/components/schemas/MerchantCatalogueShop'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    MerchantCatalogueCategory:
      type: object
      required:
      - id
      - parentId
      - name
      - slug
      - description
      - iconObjectKey
      - displayOrder
      properties:
        id: {type: string, format: uuid}
        parentId: {type: ['string', 'null'], format: uuid}
        name: {type: string}
        slug: {type: string}
        description: {type: ['string', 'null']}
        iconObjectKey: {type: ['string', 'null']}
        displayOrder: {type: integer, minimum: 0}
    ListMerchantCatalogueCategoriesResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [categories]
          properties:
            categories:
              type: array
              items: {$ref: '#/components/schemas/MerchantCatalogueCategory'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    GetMerchantCatalogueCategoryResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [category]
          properties:
            category: {$ref: '#/components/schemas/MerchantCatalogueCategory'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    MerchantProductVariant:
      type: object
      required:
      - id
      - productId
      - shopId
      - sku
      - colourName
      - colourHex
      - sizeLabel
      - mrpPaise
      - sellingPricePaise
      - costPricePaise
      - weightGrams
      - lengthCm
      - widthCm
      - heightCm
      - attributes
      - isActive
      - createdAt
      - updatedAt
      properties:
        id: {type: string, format: uuid}
        productId: {type: string, format: uuid}
        shopId: {type: string, format: uuid}
        sku: {type: string, minLength: 1, maxLength: 120}
        colourName: {type: ['string', 'null'], minLength: 1, maxLength: 120}
        colourHex:
          type: ['string', 'null']
          pattern: '^#[0-9A-F]{6}$'
        sizeLabel: {type: ['string', 'null'], minLength: 1, maxLength: 80}
        mrpPaise: {type: integer, minimum: 0}
        sellingPricePaise: {type: integer, minimum: 0}
        costPricePaise: {type: ['integer', 'null'], minimum: 0}
        weightGrams: {type: ['integer', 'null'], minimum: 1}
        lengthCm: {type: ['number', 'null'], exclusiveMinimum: 0, maximum: 999999.99}
        widthCm: {type: ['number', 'null'], exclusiveMinimum: 0, maximum: 999999.99}
        heightCm: {type: ['number', 'null'], exclusiveMinimum: 0, maximum: 999999.99}
        attributes:
          type: object
          additionalProperties: true
        isActive: {type: boolean}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
    CreateMerchantProductVariantRequest:
      type: object
      additionalProperties: false
      required: [sku, mrpPaise, sellingPricePaise]
      properties:
        sku: {type: string, minLength: 1, maxLength: 120}
        colourName: {type: ['string', 'null'], minLength: 1, maxLength: 120}
        colourHex:
          type: ['string', 'null']
          pattern: '^#[0-9A-Fa-f]{6}$'
        sizeLabel: {type: ['string', 'null'], minLength: 1, maxLength: 80}
        mrpPaise: {type: integer, minimum: 0}
        sellingPricePaise: {type: integer, minimum: 0}
        costPricePaise: {type: ['integer', 'null'], minimum: 0}
        weightGrams: {type: ['integer', 'null'], minimum: 1, maximum: 2147483647}
        lengthCm: {type: ['number', 'null'], exclusiveMinimum: 0, maximum: 999999.99}
        widthCm: {type: ['number', 'null'], exclusiveMinimum: 0, maximum: 999999.99}
        heightCm: {type: ['number', 'null'], exclusiveMinimum: 0, maximum: 999999.99}
        attributes:
          type: object
          additionalProperties: true
          default: {}
        isActive: {type: boolean, default: true}
    UpdateMerchantProductVariantRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        sku: {type: string, minLength: 1, maxLength: 120}
        colourName: {type: ['string', 'null'], minLength: 1, maxLength: 120}
        colourHex:
          type: ['string', 'null']
          pattern: '^#[0-9A-Fa-f]{6}$'
        sizeLabel: {type: ['string', 'null'], minLength: 1, maxLength: 80}
        mrpPaise: {type: integer, minimum: 0}
        sellingPricePaise: {type: integer, minimum: 0}
        costPricePaise: {type: ['integer', 'null'], minimum: 0}
        weightGrams: {type: ['integer', 'null'], minimum: 1, maximum: 2147483647}
        lengthCm: {type: ['number', 'null'], exclusiveMinimum: 0, maximum: 999999.99}
        widthCm: {type: ['number', 'null'], exclusiveMinimum: 0, maximum: 999999.99}
        heightCm: {type: ['number', 'null'], exclusiveMinimum: 0, maximum: 999999.99}
        attributes:
          type: object
          additionalProperties: true
        isActive: {type: boolean}
    ListMerchantProductVariantsResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [variants]
          properties:
            variants:
              type: array
              items: {$ref: '#/components/schemas/MerchantProductVariant'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    MerchantProductVariantResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [variant]
          properties:
            variant: {$ref: '#/components/schemas/MerchantProductVariant'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    DeactivateMerchantProductVariantResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [deactivatedVariantId]
          properties:
            deactivatedVariantId: {type: string, format: uuid}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    MerchantInventoryBalance:
      type: object
      required:
      - persisted
      - stockOnHand
      - reservedQuantity
      - damagedQuantity
      - availableQuantity
      - reorderLevel
      - version
      - lastCountedAt
      - updatedAt
      properties:
        persisted: {type: boolean}
        stockOnHand: {type: integer, minimum: 0}
        reservedQuantity: {type: integer, minimum: 0}
        damagedQuantity: {type: integer, minimum: 0}
        availableQuantity: {type: integer, minimum: 0}
        reorderLevel: {type: integer, minimum: 0}
        version: {type: ['integer', 'null'], minimum: 1}
        lastCountedAt: {type: ['string', 'null'], format: date-time}
        updatedAt: {type: ['string', 'null'], format: date-time}
    MerchantInventoryProductSummary:
      type: object
      required: [id, name, slug, brand, isActive]
      properties:
        id: {type: string, format: uuid}
        name: {type: string, minLength: 1}
        slug: {type: string, minLength: 1}
        brand: {type: ['string', 'null']}
        isActive: {type: boolean}
    MerchantInventoryVariantSummary:
      type: object
      required:
      - id
      - productId
      - sku
      - colourName
      - sizeLabel
      - isActive
      properties:
        id: {type: string, format: uuid}
        productId: {type: string, format: uuid}
        sku: {type: string, minLength: 1}
        colourName: {type: ['string', 'null']}
        sizeLabel: {type: ['string', 'null']}
        isActive: {type: boolean}
    MerchantInventoryLookupItem:
      type: object
      required: [product, variant, balance, matchKind]
      properties:
        product: {$ref: '#/components/schemas/MerchantInventoryProductSummary'}
        variant: {$ref: '#/components/schemas/MerchantInventoryVariantSummary'}
        balance: {$ref: '#/components/schemas/MerchantInventoryBalance'}
        matchKind:
          type: string
          enum: [VARIANT_ID, PRODUCT_ID, SKU_EXACT, SKU_PARTIAL, PRODUCT]
    GetMerchantInventoryBalanceResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [inventory]
          properties:
            inventory: {$ref: '#/components/schemas/MerchantInventoryLookupItem'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    LookupMerchantInventoryResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [query, results]
          properties:
            query: {type: string, minLength: 1, maxLength: 120}
            results:
              type: array
              items: {$ref: '#/components/schemas/MerchantInventoryLookupItem'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    MerchantLowStockInventoryItem:
      type: object
      required: [product, variant, balance, inventoryState]
      properties:
        product: {$ref: '#/components/schemas/MerchantInventoryProductSummary'}
        variant: {$ref: '#/components/schemas/MerchantInventoryVariantSummary'}
        balance: {$ref: '#/components/schemas/MerchantInventoryBalance'}
        inventoryState:
          type: string
          enum: [OUT_OF_STOCK, LOW_STOCK]
    ListMerchantLowStockInventoryResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items: {$ref: '#/components/schemas/MerchantLowStockInventoryItem'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    MerchantInventoryBarcode:
      type: object
      required: [id, value, type, source, isPrimary]
      properties:
        id: {type: string, format: uuid}
        value: {type: string, minLength: 1, maxLength: 255}
        type:
          type: string
          enum: [EAN13, UPC, CODE128, QR, INTERNAL]
        source:
          type: string
          enum: [MANUFACTURER, VASTRA_GENERATED, MERCHANT_ENTERED]
        isPrimary: {type: boolean}
    MerchantInventoryBarcodeLookupItem:
      type: object
      required: [barcode, product, variant, balance]
      properties:
        barcode: {$ref: '#/components/schemas/MerchantInventoryBarcode'}
        product: {$ref: '#/components/schemas/MerchantInventoryProductSummary'}
        variant: {$ref: '#/components/schemas/MerchantInventoryVariantSummary'}
        balance: {$ref: '#/components/schemas/MerchantInventoryBalance'}
    LookupMerchantInventoryByBarcodeResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [scannedBarcode, inventory]
          properties:
            scannedBarcode: {type: string, minLength: 1, maxLength: 255}
            inventory:
              $ref: '#/components/schemas/MerchantInventoryBarcodeLookupItem'
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    MerchantProductImage:
      type: object
      required:
      - id
      - productId
      - variantId
      - storageObjectKey
      - thumbnailObjectKey
      - imageUrl
      - thumbnailUrl
      - imageType
      - altText
      - displayOrder
      - isPrimary
      - widthPx
      - heightPx
      - createdAt
      properties:
        id: {type: string, format: uuid}
        productId: {type: string, format: uuid}
        variantId: {type: 'null'}
        storageObjectKey: {type: string}
        thumbnailObjectKey: {type: ['string', 'null']}
        imageUrl: {type: string, format: uri}
        thumbnailUrl: {type: ['string', 'null'], format: uri}
        imageType:
          type: string
          enum: [FRONT, BACK, SIDE, DETAIL, MODEL, SIZE_CHART]
        altText: {type: ['string', 'null'], maxLength: 500}
        displayOrder: {type: integer, minimum: 0, maximum: 10000}
        isPrimary: {type: boolean}
        widthPx: {type: ['integer', 'null'], minimum: 1, maximum: 20000}
        heightPx: {type: ['integer', 'null'], minimum: 1, maximum: 20000}
        createdAt: {type: string, format: date-time}
    CreateProductImageUploadIntentRequest:
      type: object
      additionalProperties: false
      required: [contentType, contentLength]
      properties:
        contentType:
          type: string
          enum: [image/jpeg, image/png, image/webp]
        contentLength:
          type: integer
          minimum: 1
          maximum: 10485760
    ProductImageUploadIntentResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [objectKey, uploadUrl, expiresAt, contentType, maximumBytes]
          properties:
            objectKey: {type: string}
            uploadUrl: {type: string, format: uri}
            expiresAt: {type: string, format: date-time}
            contentType:
              type: string
              enum: [image/jpeg, image/png, image/webp]
            maximumBytes: {type: integer, const: 10485760}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    FinalizeMerchantProductImageRequest:
      type: object
      additionalProperties: false
      required: [storageObjectKey]
      properties:
        storageObjectKey: {type: string, minLength: 1, maxLength: 500}
        imageType:
          type: string
          enum: [FRONT, BACK, SIDE, DETAIL, MODEL, SIZE_CHART]
          default: FRONT
        altText: {type: ['string', 'null'], minLength: 1, maxLength: 500}
        displayOrder: {type: integer, minimum: 0, maximum: 10000, default: 0}
        isPrimary: {type: boolean, default: false}
        widthPx: {type: ['integer', 'null'], minimum: 1, maximum: 20000}
        heightPx: {type: ['integer', 'null'], minimum: 1, maximum: 20000}
    UpdateMerchantProductImageRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        imageType:
          type: string
          enum: [FRONT, BACK, SIDE, DETAIL, MODEL, SIZE_CHART]
        altText: {type: ['string', 'null'], minLength: 1, maxLength: 500}
        displayOrder: {type: integer, minimum: 0, maximum: 10000}
        isPrimary: {type: boolean, const: true}
        widthPx: {type: ['integer', 'null'], minimum: 1, maximum: 20000}
        heightPx: {type: ['integer', 'null'], minimum: 1, maximum: 20000}
    ListMerchantProductImagesResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [images]
          properties:
            images:
              type: array
              items: {$ref: '#/components/schemas/MerchantProductImage'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    MerchantProductImageResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [image]
          properties:
            image: {$ref: '#/components/schemas/MerchantProductImage'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    DeleteMerchantProductImageResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [deletedImageId]
          properties:
            deletedImageId: {type: string, format: uuid}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    MerchantProduct:
      type: object
      required:
      - id
      - shopId
      - categoryId
      - name
      - slug
      - description
      - brand
      - material
      - genderCategory
      - styleTags
      - occasionTags
      - careInstructions
      - returnEligible
      - returnWindowDays
      - moderationStatus
      - isActive
      - createdAt
      - updatedAt
      - deletedAt
      properties:
        id: {type: string, format: uuid}
        shopId: {type: string, format: uuid}
        categoryId: {type: string, format: uuid}
        name: {type: string}
        slug: {type: string}
        description: {type: ['string', 'null']}
        brand: {type: ['string', 'null']}
        material: {type: ['string', 'null']}
        genderCategory:
          type: string
          enum: [MEN, WOMEN, KIDS, UNISEX]
        styleTags:
          type: array
          items: {type: string}
        occasionTags:
          type: array
          items: {type: string}
        careInstructions: {type: ['string', 'null']}
        returnEligible: {type: boolean}
        returnWindowDays: {type: integer, minimum: 0, maximum: 90}
        moderationStatus:
          type: string
          enum: [PENDING, APPROVED, REJECTED, CORRECTION_REQUIRED]
        isActive: {type: boolean}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
        deletedAt: {type: ['string', 'null'], format: date-time}
    CreateMerchantProductRequest:
      type: object
      additionalProperties: false
      required: [categoryId, name, slug]
      properties:
        categoryId: {type: string, format: uuid}
        name: {type: string, minLength: 1, maxLength: 200}
        slug:
          type: string
          minLength: 1
          maxLength: 200
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        description: {type: ['string', 'null'], maxLength: 4000}
        brand: {type: ['string', 'null'], maxLength: 200}
        material: {type: ['string', 'null'], maxLength: 200}
        genderCategory:
          type: string
          enum: [MEN, WOMEN, KIDS, UNISEX]
          default: UNISEX
        styleTags:
          type: array
          maxItems: 30
          uniqueItems: true
          items: {type: string, minLength: 1, maxLength: 80}
        occasionTags:
          type: array
          maxItems: 30
          uniqueItems: true
          items: {type: string, minLength: 1, maxLength: 80}
        careInstructions: {type: ['string', 'null'], maxLength: 2000}
        returnEligible: {type: boolean, default: true}
        returnWindowDays: {type: integer, minimum: 0, maximum: 90, default: 7}
        isActive: {type: boolean, default: true}
    UpdateMerchantProductRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        categoryId: {type: string, format: uuid}
        name: {type: string, minLength: 1, maxLength: 200}
        slug:
          type: string
          minLength: 1
          maxLength: 200
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        description: {type: ['string', 'null'], maxLength: 4000}
        brand: {type: ['string', 'null'], maxLength: 200}
        material: {type: ['string', 'null'], maxLength: 200}
        genderCategory:
          type: string
          enum: [MEN, WOMEN, KIDS, UNISEX]
        styleTags:
          type: array
          maxItems: 30
          uniqueItems: true
          items: {type: string, minLength: 1, maxLength: 80}
        occasionTags:
          type: array
          maxItems: 30
          uniqueItems: true
          items: {type: string, minLength: 1, maxLength: 80}
        careInstructions: {type: ['string', 'null'], maxLength: 2000}
        returnEligible: {type: boolean}
        returnWindowDays: {type: integer, minimum: 0, maximum: 90}
        isActive: {type: boolean}
    ListMerchantProductsResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [products]
          properties:
            products:
              type: array
              items: {$ref: '#/components/schemas/MerchantProduct'}
        meta:
          type: object
