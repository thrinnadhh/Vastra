        businessType: {type: [string, 'null']}
        onboardingStatus: {type: string}
        kycStatus: {type: string}
        approvedAt: {type: [string, 'null'], format: date-time}
    CaptainRoleProfile:
      type: object
      required: [kind, captainCode, kycStatus, availabilityStatus, vehicleType, vehicleNumber,
        ratingAverage, ratingCount, completedDeliveries, cashBalancePaise, approvedAt]
      properties:
        kind: {type: string, const: CAPTAIN}
        captainCode: {type: string}
        kycStatus: {type: string}
        availabilityStatus: {type: string}
        vehicleType: {type: [string, 'null']}
        vehicleNumber: {type: [string, 'null']}
        ratingAverage: {type: [number, 'null'], minimum: 0, maximum: 5}
        ratingCount: {type: integer, minimum: 0}
        completedDeliveries: {type: integer, minimum: 0}
        cashBalancePaise: {type: integer}
        approvedAt: {type: [string, 'null'], format: date-time}
    AdminRoleProfile:
      type: object
      required: [kind, employeeCode, department, cityScope, managerId, twoFactorEnabled]
      properties:
        kind: {type: string, const: ADMIN}
        employeeCode: {type: string}
        department: {type: string}
        cityScope:
          type: array
          items: {type: string}
        managerId: {type: [string, 'null'], format: uuid}
        twoFactorEnabled: {type: boolean}
    MerchantScopeShop:
      type: object
      required: [id, shopCode, name, verificationStatus, operationalStatus, acceptsOnlineOrders]
      properties:
        id: {type: string, format: uuid}
        shopCode: {type: string}
        name: {type: string}
        verificationStatus: {type: string}
        operationalStatus: {type: string}
        acceptsOnlineOrders: {type: boolean}
    CustomerScope:
      type: object
      required: [kind]
      properties:
        kind: {type: string, const: CUSTOMER}
    MerchantScope:
      type: object
      required: [kind, shops]
      properties:
        kind: {type: string, const: MERCHANT}
        shops:
          type: array
          items: {$ref: '#/components/schemas/MerchantScopeShop'}
    CaptainScope:
      type: object
      required: [kind, captainCode, availabilityStatus]
      properties:
        kind: {type: string, const: CAPTAIN}
        captainCode: {type: string}
        availabilityStatus: {type: string}
    AdminScope:
      type: object
      required: [kind, department, cityScope]
      properties:
        kind: {type: string, const: ADMIN}
        department: {type: string}
        cityScope:
          type: array
          items: {type: string}
    CurrentAccountData:
      type: object
      required: [id, email, accountType, status, profile, roleProfile, scope]
      properties:
        id: {type: string, format: uuid}
        email: {type: [string, 'null'], format: email}
        accountType:
          type: string
          enum: [CUSTOMER, MERCHANT, CAPTAIN, ADMIN]
        status: {type: string, const: ACTIVE}
        profile: {$ref: '#/components/schemas/CurrentAccountProfile'}
        roleProfile:
          oneOf:
          - $ref: '#/components/schemas/CustomerRoleProfile'
          - $ref: '#/components/schemas/MerchantRoleProfile'
          - $ref: '#/components/schemas/CaptainRoleProfile'
          - $ref: '#/components/schemas/AdminRoleProfile'
          discriminator:
            propertyName: kind
        scope:
          oneOf:
          - $ref: '#/components/schemas/CustomerScope'
          - $ref: '#/components/schemas/MerchantScope'
          - $ref: '#/components/schemas/CaptainScope'
          - $ref: '#/components/schemas/AdminScope'
          discriminator:
            propertyName: kind
    GetCurrentAccountResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data: {$ref: '#/components/schemas/CurrentAccountData'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: [string, 'null'], format: uuid}
    RegisterDeviceRequest:
      type: object
      additionalProperties: false
      required: [deviceFingerprint, platform, pushProvider, pushToken, appVersion]
      properties:
        deviceFingerprint: {type: string, minLength: 1, maxLength: 255}
        platform:
          type: string
          enum: [ANDROID, IOS, WEB]
        pushProvider:
          type: [string, 'null']
          enum: [FCM, APNS, WEB_PUSH, null]
        pushToken: {type: [string, 'null'], minLength: 1, maxLength: 4096}
        appVersion: {type: string, minLength: 1, maxLength: 64}
        deviceModel: {type: [string, 'null'], minLength: 1, maxLength: 120}
        osVersion: {type: [string, 'null'], minLength: 1, maxLength: 64}
      allOf:
      - if:
          properties:
            pushProvider: {type: 'null'}
        then:
          properties:
            pushToken: {type: 'null'}
      - if:
          properties:
            pushToken: {type: 'null'}
        then:
          properties:
            pushProvider: {type: 'null'}
    RegisteredDevice:
      type: object
      required: [id, deviceFingerprint, platform, pushProvider, appName, appVersion,
        deviceModel, osVersion, notificationEnabled, orderSoundEnabled, lastSeenAt,
        revokedAt]
      properties:
        id: {type: string, format: uuid}
        deviceFingerprint: {type: string}
        platform:
          type: string
          enum: [ANDROID, IOS, WEB]
        pushProvider:
          type: [string, 'null']
          enum: [FCM, APNS, WEB_PUSH, null]
        appName:
          type: string
          enum: [CUSTOMER, MERCHANT, CAPTAIN, ADMIN]
        appVersion: {type: string}
        deviceModel: {type: [string, 'null']}
        osVersion: {type: [string, 'null']}
        notificationEnabled: {type: boolean}
        orderSoundEnabled: {type: boolean}
        lastSeenAt: {type: string, format: date-time}
        revokedAt: {type: 'null'}
    RegisterDeviceResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data: {$ref: '#/components/schemas/RegisteredDevice'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: [string, 'null'], format: uuid}
    ProductVariant:
      type: object
      required:
      - id
      - productId
      - sizeLabel
      - sellingPricePaise
      - availableQuantity
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        sku:
          type: string
        colourName:
          type:
          - string
          - 'null'
        sizeLabel:
          type: string
        mrpPaise:
          type: integer
          minimum: 0
        sellingPricePaise:
          type: integer
          minimum: 0
        availableQuantity:
          type: integer
          minimum: 0
    Order:
      type: object
      required:
      - id
      - orderNumber
      - status
      - totalPaise
      properties:
        id:
          type: string
          format: uuid
        orderNumber:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        paymentStatus:
          type: string
        totalPaise:
          type: integer
          minimum: 0
        placedAt:
          type: string
          format: date-time
    OrderStatus:
      type: string
      enum:
      - PAYMENT_PENDING
      - WAITING_FOR_MERCHANT
      - MERCHANT_ACCEPTED
      - PACKING
      - READY_FOR_PICKUP
      - CAPTAIN_SEARCHING
      - CAPTAIN_ASSIGNED
      - CAPTAIN_AT_STORE
      - PICKED_UP
      - OUT_FOR_DELIVERY
      - CAPTAIN_AT_CUSTOMER
      - DELIVERED
      - COMPLETED
      - PROBLEM_REPORTED
      - CANCELLED
    CreateOrderRequest:
      type: object
      required:
      - cartId
      - quoteId
      - addressId
      - paymentMethod
      properties:
        cartId:
          type: string
          format: uuid
        quoteId:
          type: string
          format: uuid
        addressId:
          type: string
          format: uuid
        paymentMethod:
          type: string
          enum:
          - COD
          - UPI
          - CARD
        customerNote:
          type:
          - string
          - 'null'
          maxLength: 500
    InventoryAdjustmentRequest:
      type: object
      additionalProperties: false
      required: [variantId, action, quantity, reason, expectedVersion]
      description: For ADD_STOCK, RETURN_TO_STOCK, and MARK_DAMAGED, quantity is a positive delta. For STOCK_CORRECTION and STOCK_CHECK, quantity is the target physical stock-on-hand and may be zero. Offline sales use the dedicated offline-sales workflow.
      properties:
        variantId: {type: string, format: uuid}
        action:
          type: string
          enum: [ADD_STOCK, RETURN_TO_STOCK, MARK_DAMAGED, STOCK_CORRECTION, STOCK_CHECK]
        quantity: {type: integer, minimum: 0}
        reason: {type: string, minLength: 1, maxLength: 500}
        expectedVersion:
          type: ['integer', 'null']
          minimum: 1
          description: Current balance version, or null only when the balance has never been persisted.
    MerchantInventoryMovement:
      type: object
      required:
      - id
      - shopId
      - variantId
      - movementType
      - quantityChange
      - reservedChange
      - damagedChange
      - stockBefore
      - stockAfter
      - reservedBefore
      - reservedAfter
      - damagedBefore
      - damagedAfter
      - referenceType
      - referenceId
      - reason
      - performedBy
      - sourceMethod
      - createdAt
      properties:
        id: {type: string, pattern: '^[1-9][0-9]*$'}
        shopId: {type: string, format: uuid}
        variantId: {type: string, format: uuid}
        movementType:
          type: string
          enum: [STOCK_RECEIVED, OFFLINE_SALE, ONLINE_ORDER_RESERVED, ONLINE_ORDER_RELEASED, ONLINE_ORDER_COMPLETED, RETURN_TO_STOCK, MARKED_DAMAGED, STOCK_CORRECTION, STOCK_AUDIT]
        quantityChange: {type: integer}
        reservedChange: {type: integer}
        damagedChange: {type: integer}
        stockBefore: {type: integer, minimum: 0}
        stockAfter: {type: integer, minimum: 0}
        reservedBefore: {type: integer, minimum: 0}
        reservedAfter: {type: integer, minimum: 0}
        damagedBefore: {type: integer, minimum: 0}
        damagedAfter: {type: integer, minimum: 0}
        referenceType: {type: ['string', 'null']}
        referenceId: {type: ['string', 'null'], format: uuid}
        reason: {type: ['string', 'null']}
        performedBy: {type: ['string', 'null'], format: uuid}
        sourceMethod:
          type: string
          enum: [BARCODE, PHOTO_MATCH, MANUAL_SEARCH, SYSTEM, ADMIN]
        createdAt: {type: string, format: date-time}
    MerchantInventoryAdjustment:
      type: object
      required: [idempotencyKey, replayed, action, movement, balance]
      properties:
        idempotencyKey: {type: string, format: uuid}
        replayed: {type: boolean}
        action:
          type: string
          enum: [ADD_STOCK, RETURN_TO_STOCK, MARK_DAMAGED, STOCK_CORRECTION, STOCK_CHECK]
        movement: {$ref: '#/components/schemas/MerchantInventoryMovement'}
        balance: {$ref: '#/components/schemas/MerchantInventoryBalance'}
    InventoryAdjustmentResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [adjustment]
          properties:
            adjustment: {$ref: '#/components/schemas/MerchantInventoryAdjustment'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    ListMerchantInventoryMovementsResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [variantId, movements, nextCursor]
          properties:
            variantId: {type: string, format: uuid}
            movements:
              type: array
              items: {$ref: '#/components/schemas/MerchantInventoryMovement'}
            nextCursor:
              type: ['string', 'null']
              pattern: '^[1-9][0-9]*$'
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    MerchantAcceptRequest:
      type: object
      required:
      - preparationMinutes
      properties:
        preparationMinutes:
          type: integer
          minimum: 1
          maximum: 120
    MerchantRejectRequest:
      type: object
      required:
      - issueType
      properties:
        orderItemId:
          type:
          - string
          - 'null'
          format: uuid
        issueType:
          type: string
          enum:
          - OUT_OF_STOCK
          - SIZE_UNAVAILABLE
          - COLOUR_UNAVAILABLE
          - DAMAGED_ITEM
          - INVENTORY_MISMATCH
          - ITEM_NOT_FOUND
          - SHOP_BUSY
          - SHOP_CLOSING
          - OTHER
        note:
          type:
          - string
          - 'null'
          maxLength: 500
    DeliveryCompleteRequest:
      type: object
      required:
      - deliveryOtp
      properties:
        deliveryOtp:
          type: string
          pattern: ^[0-9]{4,8}$
        codCollectedPaise:
          type: integer
          minimum: 0
        proofMethod:
          type: string
          enum:
          - OTP
          - ADMIN_OVERRIDE
