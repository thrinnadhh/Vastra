        deliveryTaskId: {type: string, format: uuid}
        orderNumber: {type: string}
        orderStatus: {type: string}
        taskStatus: {type: string}
        captain: {type: ['object', 'null']}
        location: {type: ['object', 'null']}
        estimatedArrivalAt: {type: ['string', 'null'], format: date-time}
        updatedAt: {type: string, format: date-time}
    DeliveryApiResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data: {type: object, additionalProperties: true}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    CustomerFavouriteShop:
      type: object
      required: [id, name, slug, logoObjectKey, coverImageObjectKey, operationalStatus, acceptsOnlineOrders, ratingAverage, ratingCount, followerCount, favouritedAt]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        slug: {type: string}
        logoObjectKey: {type: ['string', 'null']}
        coverImageObjectKey: {type: ['string', 'null']}
        operationalStatus:
          type: string
          enum: [OPEN, BUSY, TEMPORARILY_CLOSED, CLOSED_FOR_DAY]
        acceptsOnlineOrders: {type: boolean}
        ratingAverage: {type: ['number', 'null'], minimum: 1, maximum: 5}
        ratingCount: {type: integer, minimum: 0}
        followerCount: {type: integer, minimum: 0}
        favouritedAt: {type: string, format: date-time}
    ListCustomerFavouriteShopsResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [shops]
          properties:
            shops:
              type: array
              items: {$ref: '#/components/schemas/CustomerFavouriteShop'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    SetCustomerFavouriteShopResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [shopId, isFavourite]
          properties:
            shopId: {type: string, format: uuid}
            isFavourite: {type: boolean}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    CustomerPreferences:
      type: object
      required: [genderCategories, styleTags, occasionTags, preferredColours, preferredSizes, minPricePaise, maxPricePaise, updatedAt]
      properties:
        genderCategories:
          type: array
          maxItems: 4
          uniqueItems: true
          items:
            type: string
            enum: [MEN, WOMEN, KIDS, UNISEX]
        styleTags:
          type: array
          maxItems: 20
          uniqueItems: true
          items: {type: string, minLength: 1, maxLength: 40}
        occasionTags:
          type: array
          maxItems: 20
          uniqueItems: true
          items: {type: string, minLength: 1, maxLength: 40}
        preferredColours:
          type: array
          maxItems: 12
          uniqueItems: true
          items: {type: string, pattern: '^#[0-9A-F]{6}$'}
        preferredSizes:
          type: array
          maxItems: 20
          uniqueItems: true
          items: {type: string, minLength: 1, maxLength: 20}
        minPricePaise: {type: ['integer', 'null'], minimum: 0}
        maxPricePaise: {type: ['integer', 'null'], minimum: 0}
        updatedAt: {type: ['string', 'null'], format: date-time}
    ReplaceCustomerPreferencesRequest:
      type: object
      additionalProperties: false
      properties:
        genderCategories:
          type: array
          maxItems: 4
          uniqueItems: true
          items:
            type: string
            enum: [MEN, WOMEN, KIDS, UNISEX]
        styleTags:
          type: array
          maxItems: 20
          uniqueItems: true
          items: {type: string, minLength: 1, maxLength: 40}
        occasionTags:
          type: array
          maxItems: 20
          uniqueItems: true
          items: {type: string, minLength: 1, maxLength: 40}
        preferredColours:
          type: array
          maxItems: 12
          uniqueItems: true
          items: {type: string, pattern: '^#[0-9A-Fa-f]{6}$'}
        preferredSizes:
          type: array
          maxItems: 20
          uniqueItems: true
          items: {type: string, minLength: 1, maxLength: 20}
        minPricePaise: {type: ['integer', 'null'], minimum: 0}
        maxPricePaise: {type: ['integer', 'null'], minimum: 0}
    CustomerPreferencesResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [preferences]
          properties:
            preferences: {$ref: '#/components/schemas/CustomerPreferences'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    CustomerCartShop:
      type: object
      required:
      - id
      - name
      - slug
      - logoObjectKey
      - operationalStatus
      - acceptsOnlineOrders
      properties:
        id: {type: string, format: uuid}
        name: {type: string, minLength: 1}
        slug: {type: string, minLength: 1}
        logoObjectKey: {type: ['string', 'null']}
        operationalStatus:
          type: string
          enum: [OPEN, BUSY, TEMPORARILY_CLOSED, CLOSED_FOR_DAY, PAUSED, SUSPENDED]
        acceptsOnlineOrders: {type: boolean}
    CustomerCartItem:
      type: object
      required:
      - id
      - variantId
      - productId
      - productName
      - productSlug
      - sku
      - colourName
      - sizeLabel
      - imageObjectKey
      - quantity
      - unitPricePaise
      - currentUnitPricePaise
      - priceChanged
      - availableQuantity
      - isAvailable
      - lineTotalPaise
      - currentLineTotalPaise
      - addedAt
      - updatedAt
      properties:
        id: {type: string, format: uuid}
        variantId: {type: string, format: uuid}
        productId: {type: string, format: uuid}
        productName: {type: string, minLength: 1}
        productSlug: {type: string, minLength: 1}
        sku: {type: string, minLength: 1}
        colourName: {type: ['string', 'null']}
        sizeLabel: {type: ['string', 'null']}
        imageObjectKey: {type: ['string', 'null']}
        quantity: {type: integer, minimum: 1, maximum: 20}
        unitPricePaise: {type: integer, minimum: 0}
        currentUnitPricePaise: {type: integer, minimum: 0}
        priceChanged: {type: boolean}
        availableQuantity: {type: integer, minimum: 0}
        isAvailable: {type: boolean}
        lineTotalPaise: {type: integer, minimum: 0}
        currentLineTotalPaise: {type: integer, minimum: 0}
        addedAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
    CustomerCart:
      type: object
      required:
      - id
      - shop
      - items
      - itemCount
      - subtotalPaise
      - currentSubtotalPaise
      - hasPriceChanges
      - hasUnavailableItems
      - createdAt
      - updatedAt
      properties:
        id: {type: string, format: uuid}
        shop: {$ref: '#/components/schemas/CustomerCartShop'}
        items:
          type: array
          items: {$ref: '#/components/schemas/CustomerCartItem'}
        itemCount: {type: integer, minimum: 0}
        subtotalPaise: {type: integer, minimum: 0}
        currentSubtotalPaise: {type: integer, minimum: 0}
        hasPriceChanges: {type: boolean}
        hasUnavailableItems: {type: boolean}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
    CustomerCartResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [cart]
          properties:
            cart:
              oneOf:
              - $ref: '#/components/schemas/CustomerCart'
              - type: 'null'
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    SetCustomerCartItemRequest:
      type: object
      additionalProperties: false
      required: [variantId, quantity]
      properties:
        variantId: {type: string, format: uuid}
        quantity: {type: integer, minimum: 1, maximum: 20}
        replaceExistingCart:
          type: boolean
          default: false
          description: Must be true to abandon an active cart from another shop.
    UpdateCustomerCartItemRequest:
      type: object
      additionalProperties: false
      required: [quantity]
      properties:
        quantity: {type: integer, minimum: 1, maximum: 20}
    CreateCustomerCheckoutQuoteRequest:
      type: object
      additionalProperties: false
      required: [addressId]
      properties:
        addressId: {type: string, format: uuid}
    CustomerCheckoutQuoteAddress:
      type: object
      required: [id, label, recipientName, phoneNumber, line1, line2, landmark, area, city, state, postalCode, countryCode, latitude, longitude]
      properties:
        id: {type: string, format: uuid}
        label: {type: ['string', 'null']}
        recipientName: {type: string, minLength: 1}
        phoneNumber: {type: string, minLength: 1}
        line1: {type: string, minLength: 1}
        line2: {type: ['string', 'null']}
        landmark: {type: ['string', 'null']}
        area: {type: string, minLength: 1}
        city: {type: string, minLength: 1}
        state: {type: string, minLength: 1}
        postalCode: {type: string, minLength: 1}
        countryCode: {type: string, pattern: '^[A-Z]{2}$'}
        latitude: {type: number, minimum: -90, maximum: 90}
        longitude: {type: number, minimum: -180, maximum: 180}
    CustomerCheckoutQuoteShop:
      type: object
      required: [id, name, slug, minimumOrderPaise, averagePreparationMinutes, distanceMeters, serviceRadiusMeters]
      properties:
        id: {type: string, format: uuid}
        name: {type: string, minLength: 1}
        slug: {type: string, minLength: 1}
        minimumOrderPaise: {type: integer, minimum: 0}
        averagePreparationMinutes: {type: integer, minimum: 0}
        distanceMeters: {type: integer, minimum: 0}
        serviceRadiusMeters: {type: integer, minimum: 1}
    CustomerCheckoutQuoteItem:
      type: object
      required: [cartItemId, variantId, productId, productName, sku, colourName, sizeLabel, quantity, previousUnitPricePaise, unitPricePaise, priceChanged, availableQuantity, inventoryVersion, lineTotalPaise]
      properties:
        cartItemId: {type: string, format: uuid}
        variantId: {type: string, format: uuid}
        productId: {type: string, format: uuid}
        productName: {type: string, minLength: 1}
        sku: {type: string, minLength: 1}
        colourName: {type: ['string', 'null']}
        sizeLabel: {type: ['string', 'null']}
        quantity: {type: integer, minimum: 1, maximum: 20}
        previousUnitPricePaise: {type: integer, minimum: 0}
        unitPricePaise: {type: integer, minimum: 0}
        priceChanged: {type: boolean}
        availableQuantity: {type: integer, minimum: 0}
        inventoryVersion: {type: integer, minimum: 1}
        lineTotalPaise: {type: integer, minimum: 0}
    CustomerCheckoutQuoteTotals:
      type: object
      required: [subtotalPaise, productDiscountPaise, couponDiscountPaise, deliveryFeePaise, platformFeePaise, taxPaise, totalPaise]
      properties:
        subtotalPaise: {type: integer, minimum: 0}
        productDiscountPaise: {type: integer, minimum: 0}
        couponDiscountPaise: {type: integer, minimum: 0}
        deliveryFeePaise: {type: integer, minimum: 0}
        platformFeePaise: {type: integer, minimum: 0}
        taxPaise: {type: integer, minimum: 0}
        totalPaise: {type: integer, minimum: 0}
    CustomerCheckoutQuote:
      type: object
      required: [id, cartId, address, shop, items, totals, estimatedPreparationMinutes, estimatedTravelMinutes, estimatedDeliveryAt, expiresAt, createdAt]
      properties:
        id: {type: string, format: uuid}
        cartId: {type: string, format: uuid}
        address: {$ref: '#/components/schemas/CustomerCheckoutQuoteAddress'}
        shop: {$ref: '#/components/schemas/CustomerCheckoutQuoteShop'}
        items:
          type: array
          minItems: 1
          items: {$ref: '#/components/schemas/CustomerCheckoutQuoteItem'}
        totals: {$ref: '#/components/schemas/CustomerCheckoutQuoteTotals'}
        estimatedPreparationMinutes: {type: integer, minimum: 0}
        estimatedTravelMinutes: {type: integer, minimum: 0}
        estimatedDeliveryAt: {type: string, format: date-time}
        expiresAt: {type: string, format: date-time}
        createdAt: {type: string, format: date-time}
    CustomerCheckoutQuoteResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [quote]
          properties:
            quote: {$ref: '#/components/schemas/CustomerCheckoutQuote'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['string', 'null'], format: uuid}
    MerchantAlertDeliveryMetrics:
      type: object
      required: [windowMinutes, generatedAt, alertsCreated, alertsSent, alertsAcknowledged, alertsExpired, alertsFailed, averageAcknowledgementSeconds, activeAlerts, remindersQueued, deliveryAttempts, successfulAttempts, failedAttempts, retryableFailures, unregisteredTokens, outboxBacklog]
      properties:
        windowMinutes: {type: integer, minimum: 5, maximum: 10080}
        generatedAt: {type: string, format: date-time}
        alertsCreated: {type: integer, minimum: 0}
        alertsSent: {type: integer, minimum: 0}
        alertsAcknowledged: {type: integer, minimum: 0}
        alertsExpired: {type: integer, minimum: 0}
        alertsFailed: {type: integer, minimum: 0}
        averageAcknowledgementSeconds: {type: integer, minimum: 0}
        activeAlerts: {type: integer, minimum: 0}
        remindersQueued: {type: integer, minimum: 0}
        deliveryAttempts: {type: integer, minimum: 0}
        successfulAttempts: {type: integer, minimum: 0}
        failedAttempts: {type: integer, minimum: 0}
        retryableFailures: {type: integer, minimum: 0}
        unregisteredTokens: {type: integer, minimum: 0}
        outboxBacklog: {type: integer, minimum: 0}
    MerchantAlertDeliveryActivity:
      type: object
      required: [alertId, orderId, orderNumber, shopId, shopName, alertStatus, attemptCount, reminderCount, createdAt, expiresAt, acknowledgedAt, expiredAt, failureReason, successfulDeviceAttempts, failedDeviceAttempts, retryableDeviceFailures, lastAttemptAt, lastFailureCode]
      properties:
        alertId: {type: string, format: uuid}
        orderId: {type: string, format: uuid}
        orderNumber: {type: string}
        shopId: {type: string, format: uuid}
        shopName: {type: string}
        alertStatus: {type: string, enum: [PENDING, SENT, DELIVERED, ACKNOWLEDGED, EXPIRED, FAILED]}
        attemptCount: {type: integer, minimum: 0}
        reminderCount: {type: integer, minimum: 0}
        createdAt: {type: string, format: date-time}
        expiresAt: {type: string, format: date-time}
        acknowledgedAt: {type: [string, 'null'], format: date-time}
        expiredAt: {type: [string, 'null'], format: date-time}
        failureReason: {type: [string, 'null']}
        successfulDeviceAttempts: {type: integer, minimum: 0}
        failedDeviceAttempts: {type: integer, minimum: 0}
        retryableDeviceFailures: {type: integer, minimum: 0}
        lastAttemptAt: {type: [string, 'null'], format: date-time}
        lastFailureCode: {type: [string, 'null']}
    MerchantAlertMetricsResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [metrics]
          properties:
            metrics: {$ref: '#/components/schemas/MerchantAlertDeliveryMetrics'}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['null']}
    MerchantAlertActivityResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: {type: boolean, const: true}
        data:
          type: object
          required: [activity, nextCursor]
          properties:
            activity:
              type: array
              items: {$ref: '#/components/schemas/MerchantAlertDeliveryActivity'}
            nextCursor: {type: [string, 'null'], format: date-time}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: {type: ['null']}
security:
- bearerAuth: []

paths:
  /me:
    get:
      operationId: getCurrentAccount
      summary: Get the authenticated account, role profile, and current scope
      tags:
      - Common
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Current authenticated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCurrentAccountResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Account is not permitted to access Vastra
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Account profile state is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '503':
          description: Account information is temporarily unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /me/devices:
    post:
      operationId: registerCurrentDevice
      summary: Register or refresh the authenticated account's device
      description: Upserts the device by authenticated user and device fingerprint. The
        account identity and app name are derived from the access token, and the push
        token is never returned.
      tags:
      - Common
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequest'
      responses:
        '200':
          description: Device registered or refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterDeviceResponse'
        '400':
          description: Device registration input is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Account is not permitted to access Vastra
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Registered device state is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '503':
          description: Device registration is temporarily unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /customer/inventory/reservations:
    post:
      operationId: createCustomerInventoryReservation
      summary: Reserve an available variant for the authenticated customer's active cart
      description: Performs an RLS ownership precheck, then atomically locks inventory, creates one active cart reservation, writes an immutable movement, and safely replays an identical idempotent request.
      tags: [Customer]
      security: [{bearerAuth: []}]
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateCustomerInventoryReservationRequest'}
      responses:
        '200':
          description: Reservation created or an identical request replayed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CustomerInventoryReservationResponse'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}
        '500':
          description: Reservation or inventory data is internally inconsistent
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
        '503':
          description: Inventory reservation provider is temporarily unavailable
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
  /customer/inventory/reservations/{reservationId}/release:
    post:
      operationId: releaseCustomerInventoryReservation
      summary: Idempotently release one authenticated-customer cart reservation
      description: Releases reserved quantity, creates one immutable release movement, and returns the existing final state on a repeated request.
      tags: [Customer]
      security: [{bearerAuth: []}]
      parameters:
      - name: reservationId
        in: path
        required: true
        schema: {type: string, format: uuid}
      requestBody:
        required: false
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ReleaseCustomerInventoryReservationRequest'}
      responses:
        '200':
          description: Reservation released or its final state replayed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CustomerInventoryReservationResponse'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}
        '500':
          description: Reservation or inventory data is internally inconsistent
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
        '503':
          description: Inventory reservation provider is temporarily unavailable
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
  /customer/home:
    get:
      operationId: getCustomerHome
      summary: Compose the customer home feed for one serviceable location
      description: Reuses the active category, serviceable nearby-shop, and public catalogue read models. Products are interleaved across nearby shops so one store cannot dominate the initial home feed.
      tags: [Customer]
      security: [{bearerAuth: []}]
      parameters:
      - name: latitude
        in: query
        required: true
        schema: {type: number, minimum: -90, maximum: 90}
      - name: longitude
        in: query
        required: true
        schema: {type: number, minimum: -180, maximum: 180}
      - name: shopLimit
        in: query
        required: false
        schema: {type: integer, minimum: 1, maximum: 12, default: 8}
      - name: productLimit
        in: query
        required: false
        schema: {type: integer, minimum: 1, maximum: 24, default: 12}
      responses:
        '200':
          description: Composed customer home feed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GetCustomerHomeResponse'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '500':
          description: Home catalogue, category, or shop data is internally inconsistent
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
        '503':
          description: Customer home composition is temporarily unavailable
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
  /shops/nearby:
    get:
      operationId: listCustomerNearbyShops
      summary: List public shops serviceable for a customer location
      description: Uses each shop's own delivery radius and PostGIS distance to return only public shops that can serve the requested point, ordered nearest first.
      tags: [Customer]
      security: [{bearerAuth: []}]
      parameters:
      - name: latitude
        in: query
        required: true
        schema: {type: number, minimum: -90, maximum: 90}
      - name: longitude
        in: query
        required: true
        schema: {type: number, minimum: -180, maximum: 180}
      - name: limit
        in: query
        required: false
        schema: {type: integer, minimum: 1, maximum: 50, default: 20}
      responses:
        '200':
          description: Public shops whose service radius covers the location
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ListCustomerNearbyShopsResponse'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '500':
          description: Nearby-shop data is internally inconsistent
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
        '503':
          description: Nearby-shop discovery is temporarily unavailable
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
  /shops/{shopId}:
    get:
      operationId: getCustomerShopDetail
      summary: Get one public shop with current serviceability and ordering status
      description: Requires the customer's serviceable location and returns public shop metadata, distance, delivery-radius coverage, weekly hours, today's effective hours in Asia/Kolkata, and whether an online order can currently be placed.
      tags: [Customer]
      security: [{bearerAuth: []}]
      parameters:
      - name: shopId
        in: path
        required: true
        schema: {type: string, format: uuid}
      - name: latitude
        in: query
        required: true
        schema: {type: number, minimum: -90, maximum: 90}
      - name: longitude
        in: query
        required: true
        schema: {type: number, minimum: -180, maximum: 180}
      responses:
        '200':
          description: Public shop detail and current ordering decision
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GetCustomerShopDetailResponse'}
        '400': {$ref: '#/components/responses/BadRequest'}
