    WardrobeUploadIntent:
      type: object
      required: [uploadId, uploadUrl, expiresAt]
      properties:
        uploadId: {type: string, format: uuid}
        uploadUrl: {type: string, format: uri}
        expiresAt: {type: string, format: date-time}
    CreateWardrobeItemRequest:
      type: object
      required: [uploadId, category, colour, occasion, season]
      properties:
        uploadId: {type: string, format: uuid}
        category: {type: string, minLength: 1, maxLength: 80}
        colour: {type: string, minLength: 1, maxLength: 80}
        occasion: {type: string, minLength: 1, maxLength: 80}
        season: {type: string, minLength: 1, maxLength: 80}
        notes: {type: [string, 'null'], maxLength: 500}
    UpdateWardrobeItemRequest:
      type: object
      minProperties: 1
      properties:
        category: {type: string, minLength: 1, maxLength: 80}
        colour: {type: string, minLength: 1, maxLength: 80}
        occasion: {type: string, minLength: 1, maxLength: 80}
        season: {type: string, minLength: 1, maxLength: 80}
        notes: {type: [string, 'null'], maxLength: 500}
    LookItemInput:
      type: object
      required: [sourceType]
      properties:
        sourceType: {type: string, enum: [WARDROBE_ITEM, PRODUCT_VARIANT]}
        wardrobeItemId: {type: [string, 'null'], format: uuid}
        productVariantId: {type: [string, 'null'], format: uuid}
      oneOf:
      - required: [wardrobeItemId]
        properties:
          sourceType: {const: WARDROBE_ITEM}
          wardrobeItemId: {type: string, format: uuid}
          productVariantId: {type: 'null'}
      - required: [productVariantId]
        properties:
          sourceType: {const: PRODUCT_VARIANT}
          wardrobeItemId: {type: 'null'}
          productVariantId: {type: string, format: uuid}
    LookItem:
      allOf:
      - $ref: '#/components/schemas/LookItemInput'
      - type: object
        required: [id, displayPosition]
        properties:
          id: {type: string, format: uuid}
          displayPosition: {type: integer, minimum: 0}
          currentSellingPricePaise: {type: [integer, 'null'], minimum: 0}
          availableQuantity: {type: [integer, 'null'], minimum: 0}
          imageUrl: {type: [string, 'null'], format: uri}
    SavedLook:
      type: object
      required: [id, ownerCustomerId, name, items, createdAt, updatedAt]
      properties:
        id: {type: string, format: uuid}
        ownerCustomerId: {type: string, format: uuid}
        name: {type: string}
        items:
          type: array
          items: {$ref: '#/components/schemas/LookItem'}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
    SavedLookList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: {$ref: '#/components/schemas/SavedLook'}
        nextCursor: {type: [string, 'null']}
    CreateLookRequest:
      type: object
      required: [name, items]
      properties:
        name: {type: string, minLength: 1, maxLength: 120}
        items:
          type: array
          minItems: 1
          maxItems: 50
          items: {$ref: '#/components/schemas/LookItemInput'}
    UpdateLookRequest:
      type: object
      minProperties: 1
      properties:
        name: {type: string, minLength: 1, maxLength: 120}
        items:
          type: array
          minItems: 1
          maxItems: 50
          items: {$ref: '#/components/schemas/LookItemInput'}
    DuplicateLookRequest:
      type: object
      properties:
        name: {type: [string, 'null'], minLength: 1, maxLength: 120}
    AddLookProductsToCartRequest:
      type: object
      required: [productVariantIds]
      properties:
        productVariantIds:
          type: array
          minItems: 1
          uniqueItems: true
          items: {type: string, format: uuid}
    CartTransferResult:
      type: object
      required: [cartId, addedVariantIds]
      properties:
        cartId: {type: string, format: uuid}
        addedVariantIds:
          type: array
          items: {type: string, format: uuid}
    GroupRoom:
      type: object
      required: [id, ownerCustomerId, name, status, members, shares, createdAt,
        updatedAt]
      properties:
        id: {type: string, format: uuid}
        ownerCustomerId: {type: string, format: uuid}
        name: {type: string}
        status: {type: string, enum: [OPEN, CLOSED]}
        members:
          type: array
          items:
            type: object
            required: [customerId, role, status, joinedAt]
            properties:
              customerId: {type: string, format: uuid}
              role: {type: string, enum: [OWNER, PARTICIPANT]}
              status: {type: string, enum: [ACTIVE, REMOVED]}
              joinedAt: {type: string, format: date-time}
        shares:
          type: array
          items: {$ref: '#/components/schemas/GroupShare'}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
        closedAt: {type: [string, 'null'], format: date-time}
    GroupRoomList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: {$ref: '#/components/schemas/GroupRoom'}
        nextCursor: {type: [string, 'null']}
    CreateGroupRoomRequest:
      type: object
      required: [name]
      properties:
        name: {type: string, minLength: 1, maxLength: 120}
    CloseGroupRoomRequest:
      type: object
      properties:
        reason: {type: [string, 'null'], maxLength: 500}
    CreateGroupInviteRequest:
      type: object
      required: [method, expiresAt]
      properties:
        method: {type: string, enum: [LINK, JOIN_CODE]}
        expiresAt: {type: string, format: date-time}
        maxUses: {type: integer, minimum: 1, maximum: 100}
    GroupInvite:
      type: object
      required: [id, roomId, method, expiresAt]
      properties:
        id: {type: string, format: uuid}
        roomId: {type: string, format: uuid}
        method: {type: string, enum: [LINK, JOIN_CODE]}
        inviteToken: {type: [string, 'null']}
        joinCode: {type: [string, 'null']}
        expiresAt: {type: string, format: date-time}
      description: The creation response contains exactly one inviteToken or joinCode.
    JoinGroupRoomRequest:
      type: object
      properties:
        inviteToken: {type: [string, 'null'], minLength: 20}
        joinCode: {type: [string, 'null'], minLength: 6, maxLength: 12}
      oneOf:
      - required: [inviteToken]
        properties:
          inviteToken: {type: string, minLength: 20}
          joinCode: {type: 'null'}
      - required: [joinCode]
        properties:
          inviteToken: {type: 'null'}
          joinCode: {type: string, minLength: 6, maxLength: 12}
    GroupShare:
      type: object
      required: [id, roomId, sharedBy, shareType, sourceAvailable, createdAt, votes,
        comments, shortlisted]
      properties:
        id: {type: string, format: uuid}
        roomId: {type: string, format: uuid}
        sharedBy: {type: string, format: uuid}
        shareType: {type: string, enum: [PRODUCT_VARIANT, SAVED_LOOK]}
        productVariantId: {type: [string, 'null'], format: uuid}
        savedLookId: {type: [string, 'null'], format: uuid}
        currentSellingPricePaise: {type: [integer, 'null'], minimum: 0}
        availableQuantity: {type: [integer, 'null'], minimum: 0}
        sourceAvailable: {type: boolean}
        sharedLook:
          description: Room-visible snapshot captured when a saved look was shared.
          oneOf: [{$ref: '#/components/schemas/SavedLook'}, {type: 'null'}]
        votes:
          type: array
          items:
            type: object
            required: [customerId, vote, updatedAt]
            properties:
              customerId: {type: string, format: uuid}
              vote: {type: string, enum: [LOVE, MAYBE, SKIP]}
              updatedAt: {type: string, format: date-time}
        comments:
          type: array
          items: {$ref: '#/components/schemas/GroupComment'}
        shortlisted: {type: boolean}
        createdAt: {type: string, format: date-time}
    CreateGroupShareRequest:
      type: object
      required: [shareType]
      properties:
        shareType: {type: string, enum: [PRODUCT_VARIANT, SAVED_LOOK]}
        productVariantId: {type: [string, 'null'], format: uuid}
        savedLookId: {type: [string, 'null'], format: uuid}
      oneOf:
      - required: [productVariantId]
        properties:
          shareType: {const: PRODUCT_VARIANT}
          productVariantId: {type: string, format: uuid}
          savedLookId: {type: 'null'}
      - required: [savedLookId]
        properties:
          shareType: {const: SAVED_LOOK}
          productVariantId: {type: 'null'}
          savedLookId: {type: string, format: uuid}
    AddGroupProductToCartRequest:
      type: object
      required: [quantity]
      properties:
        quantity: {type: integer, minimum: 1, maximum: 20}
    SetGroupVoteRequest:
      type: object
      required: [vote]
      properties:
        vote: {type: string, enum: [LOVE, MAYBE, SKIP]}
    GroupVote:
      type: object
      required: [shareId, customerId, vote, updatedAt]
      properties:
        shareId: {type: string, format: uuid}
        customerId: {type: string, format: uuid}
        vote: {type: string, enum: [LOVE, MAYBE, SKIP]}
        updatedAt: {type: string, format: date-time}
    CreateGroupCommentRequest:
      type: object
      required: [body]
      properties:
        body: {type: string, minLength: 1, maxLength: 1000}
    GroupComment:
      type: object
      required: [id, shareId, authorCustomerId, body, createdAt]
      properties:
        id: {type: string, format: uuid}
        shareId: {type: string, format: uuid}
        authorCustomerId: {type: string, format: uuid}
        body: {type: string}
        createdAt: {type: string, format: date-time}
    CreateGroupReportRequest:
      type: object
      required: [reason]
      properties:
        shareId: {type: [string, 'null'], format: uuid}
        commentId: {type: [string, 'null'], format: uuid}
        reason:
          type: string
          enum: [HARASSMENT, HATE, SEXUAL_CONTENT, SPAM, IMPERSONATION, OTHER]
        details: {type: [string, 'null'], maxLength: 1000}
    GroupReportReceipt:
      type: object
      required: [id, roomId, status, createdAt]
      properties:
        id: {type: string, format: uuid}
        roomId: {type: string, format: uuid}
        status: {type: string, enum: [RECEIVED]}
        createdAt: {type: string, format: date-time}
    Profile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        accountType:
          type: string
          enum:
          - CUSTOMER
          - MERCHANT
          - CAPTAIN
          - ADMIN
        fullName:
          type:
          - string
          - 'null'
        phoneNumber:
          type:
          - string
          - 'null'
        status:
          type: string
    CurrentAccountProfile:
      type: object
      required: [fullName, phoneNumber, avatarUrl]
      properties:
        fullName: {type: [string, 'null']}
        phoneNumber: {type: [string, 'null']}
        avatarUrl: {type: [string, 'null'], format: uri}
    CustomerRoleProfile:
      type: object
      required: [kind, dateOfBirth, genderPreference, profileCompleted, defaultAddressId]
