              schema: {$ref: '#/components/schemas/ApiError'}
  /customer/products/search:
    get:
      operationId: searchCustomerProducts
      summary: Search approved products from shops serviceable for a customer location
      description: Uses weighted PostgreSQL full-text search over product name, brand, description, material, style tags, and occasion tags. Only products from public shops covering the requested location are considered. Live inventory is hydrated without exposing inventory internals.
      tags: [Customer]
      security: [{bearerAuth: []}]
      parameters:
      - name: q
        in: query
        required: true
        schema: {type: string, minLength: 2, maxLength: 100}
      - name: latitude
        in: query
        required: true
        schema: {type: number, minimum: -90, maximum: 90}
      - name: longitude
        in: query
        required: true
        schema: {type: number, minimum: -180, maximum: 180}
      - name: categoryId
        in: query
        required: false
        schema: {type: string, format: uuid}
      - name: gender
        in: query
        required: false
        schema:
          type: string
          enum: [MEN, WOMEN, KIDS, UNISEX]
      - name: shopId
        in: query
        required: false
        schema: {type: string, format: uuid}
      - name: minPricePaise
        in: query
        required: false
        schema: {type: integer, minimum: 0}
      - name: maxPricePaise
        in: query
        required: false
        schema: {type: integer, minimum: 0}
      - name: availableOnly
        in: query
        required: false
        schema: {type: boolean, default: false}
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum: [RELEVANCE, DISTANCE, PRICE_ASC, PRICE_DESC]
          default: RELEVANCE
      - name: cursor
        in: query
        required: false
        schema: {type: string}
        description: Opaque continuation cursor returned by the previous response.
      - name: limit
        in: query
        required: false
        schema: {type: integer, minimum: 1, maximum: 50, default: 20}
      responses:
        '200':
          description: Serviceable public product-search page
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SearchCustomerProductsResponse'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '500':
          description: Search, catalogue, or availability data is internally inconsistent
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
        '503':
          description: Product search is temporarily unavailable
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
